<!DOCTYPE html>
<html>

<head>
    <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
    <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.447.0?deps=react@18.2.0"
    }
  }
  </script>
</head>

<body>
    <div id="root"></div>
    <div id="status">Loading...</div>
    <script type="text/babel" data-presets="react" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Calculator, Play, RotateCcw, Clock, Edit3 } from 'lucide-react';

        const CountdownUnit = ({ value, label }) => (
            <div style={{ textAlign: 'center' }}>
                <div>{String(value).padStart(2, '0')}</div>
                <div>{label}</div>
            </div>
        );

        const CountdownSeparator = () => <div>:</div>;

        const CalculatorWidget = ({ }) => {
            const [display, setDisplay] = useState('0');
            const [prevValue, setPrevValue] = useState(null);
            return <div>Calculator: {display}</div>;
        };

        const CountdownWidget = ({ }) => {
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0, total: 0 });
            return (
                <div>
                    <CountdownUnit value={timeLeft.days} label="DAYS" />
                    <CountdownSeparator />
                </div>
            );
        };

        const App = () => (
            <div>
                <h1>Test OK! Icons loaded.</h1>
                <Calculator size={24} />
                <Play size={24} />
                <RotateCcw size={24} />
                <Clock size={24} />
                <Edit3 size={24} />
                <CalculatorWidget />
                <CountdownWidget />
            </div>
        );

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
        document.getElementById('status').innerText = 'Rendered!';
    </script>
</body>

</html>
