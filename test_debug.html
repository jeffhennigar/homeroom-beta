<!DOCTYPE html>
<html>

<head>
    <script>
        // Override Babel to intercept errors
        window._babelErrors = [];
        const origError = console.error;
        console.error = function () {
            window._babelErrors.push(Array.from(arguments).join(' '));
            origError.apply(console, arguments);
        };
        window.onerror = function (msg, url, line, col, error) {
            document.body.innerHTML += '<pre style="color:red;white-space:pre-wrap">ERROR: ' + msg + '\nURL: ' + url + '\nLine: ' + line + ':' + col + '\n' + (error ? error.stack : 'No stack') + '</pre>';
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js" crossorigin></script>
    <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "react-dom": "https://esm.sh/react-dom@18.2.0",
      "lucide-react": "https://esm.sh/lucide-react@0.447.0?deps=react@18.2.0"
    }
  }
  </script>
    <script>
        // After Babel loads, transform the main script manually
        window.addEventListener('DOMContentLoaded', async function () {
            const scriptEl = document.getElementById('mainScript');
            if (!scriptEl) { document.body.innerHTML = 'No script found'; return; }
            const code = scriptEl.textContent;

            try {
                document.body.innerHTML += '<pre>Transforming with Babel...</pre>';
                const result = Babel.transform(code, {
                    presets: ['react'],
                    sourceType: 'module',
                    filename: 'index.js'
                });
                document.body.innerHTML += '<pre style="color:green">Babel transform SUCCESS! Code length: ' + result.code.length + '</pre>';
            } catch (e) {
                document.body.innerHTML += '<pre style="color:red;white-space:pre-wrap">BABEL TRANSFORM ERROR:\n' + e.message + '\n' + (e.loc ? 'Line: ' + e.loc.line + ' Column: ' + e.loc.column : '') + '</pre>';
            }
        });
    </script>
</head>

<body>
    <h3>Babel Transform Test</h3>
    <!-- Load just the script text for transformation test -->
    <script id="mainScript" type="text/plain">
  </script>
</body>

</html>
