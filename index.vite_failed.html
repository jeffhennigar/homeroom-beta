<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HomeRoom Pro</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Tailwind CDN (Legacy Mode) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        indigo: {
                            50: 'var(--accent-50)',
                            100: 'var(--accent-100)',
                            200: 'var(--accent-200)',
                            300: 'var(--accent-300)',
                            400: 'var(--accent-400)',
                            500: 'var(--accent-500)',
                            600: 'var(--accent-600)',
                            700: 'var(--accent-700)',
                            800: 'var(--accent-800)',
                            900: 'var(--accent-900)',
                        },
                        purple: {
                            50: 'var(--accent-50)',
                            100: 'var(--accent-100)',
                            200: 'var(--accent-200)',
                            300: 'var(--accent-300)',
                            400: 'var(--accent-400)',
                            500: 'var(--accent-500)',
                            600: 'var(--accent-600)',
                            700: 'var(--accent-700)',
                            800: 'var(--accent-800)',
                            900: 'var(--accent-900)',
                        },
                        blue: {
                            50: 'var(--accent-50)',
                            100: 'var(--accent-100)',
                            200: 'var(--accent-200)',
                            300: 'var(--accent-300)',
                            400: 'var(--accent-400)',
                            500: 'var(--accent-500)',
                            600: 'var(--accent-600)',
                            700: 'var(--accent-700)',
                            800: 'var(--accent-800)',
                            900: 'var(--accent-900)',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Lexend:wght@300;400;500;600;700;800&family=VT323&family=Oswald:wght@500;700&family=Caveat:wght@400;700&family=Bangers&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">

    <!-- Physics Engine (Legacy Dependency) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <!-- Error Trapping -->
    <script>
        window.onerror = function (msg, url, line, col, error) {
            // Ignore ResizeObserver errors commonly thrown by extensions/brownser
            if (msg.includes('ResizeObserver loop')) return false;

            const errDiv = document.createElement('div');
            errDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:red;color:white;z-index:999999;padding:10px;font-family:monospace;font-size:12px;';
            errDiv.innerHTML = '<strong>GLOBAL ERROR:</strong> ' + msg + ' <br/> at ' + url + ':' + line + ':' + col;
            document.body.appendChild(errDiv);
            return false;
        };
        window.onunhandledrejection = function (event) {
            const errDiv = document.createElement('div');
            errDiv.style.cssText = 'position:fixed;top:40px;left:0;width:100%;background:orange;color:white;z-index:999999;padding:10px;font-family:monospace;font-size:12px;';
            errDiv.innerHTML = '<strong>PROMISE REJECTION:</strong> ' + (event.reason ? event.reason.message || event.reason : 'Unknown rejection');
            document.body.appendChild(errDiv);
        };
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
