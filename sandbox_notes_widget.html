<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NotesWidget Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "react-dom": "https://esm.sh/react-dom@18.2.0",
      "lucide-react": "https://esm.sh/lucide-react@0.292.0"
    }
  }
  </script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { createPortal } from 'react-dom';
        import {
            Type, GripVertical, Settings, Plus, X, List, Bold, Italic, Underline, Palette, Palette as PaletteIcon, Sun, Minus, PieChart, Hash, Volume2, VolumeX, Pause, Play, RotateCcw, Shuffle, GripHorizontal, Lightbulb, Clock, Check
        } from 'lucide-react';

        const TimerIcon = () => <span>Timer</span>;

        const EDITOR_SWATCHES = ['#000000', '#475569', '#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6', '#6366f1', '#a855f7', '#ec4899', '#ffffff'];
        const EDITOR_FONTS = ['Poppins', 'Arial', 'Georgia', 'Impact', 'Caveat', 'Bangers', 'Courier New', 'VT323', 'Oswald'];
        const WIDGET_TYPE_LABELS = { TEXT: 'Notes' };

        const FloatingFormattingToolbar = ({
            pos, formats, exec, onClose, updateData, widgetId, hasShadow, fontScale, fontFamily,
            showFontColorMenu, setShowFontColorMenu, showFontMenu, setShowFontMenu
        }) => {
            if (!pos) return null;
            return createPortal(
                <div className="fixed z-[10010] bg-white rounded-xl shadow-2xl border border-slate-200 p-1.5 flex items-center gap-1 -translate-x-1/2"
                    style={{ top: Math.max(10, pos.top - 55), left: Math.max(100, Math.min(window.innerWidth - 100, pos.left)), pointerEvents: 'auto' }}
                    onMouseDown={e => e.preventDefault()}>
                    <button onClick={() => exec('bold')} className={`p-1.5 rounded ${formats.bold ? 'bg-indigo-100 text-indigo-600 font-bold' : 'hover:bg-slate-100 text-slate-600'}`}><Bold size={16} /></button>
                    <button onClick={() => exec('italic')} className={`p-1.5 rounded ${formats.italic ? 'bg-indigo-100 text-indigo-600 italic' : 'hover:bg-slate-100 text-slate-600'}`}><Italic size={16} /></button>
                    <button onClick={() => exec('underline')} className={`p-1.5 rounded ${formats.underline ? 'bg-indigo-100 text-indigo-600 underline' : 'hover:bg-slate-100 text-slate-600'}`}><Underline size={16} /></button>
                    <div className="w-px h-5 bg-slate-200 mx-1" />
                    <div className="relative">
                        <button onClick={(e) => { e.stopPropagation(); setShowFontColorMenu(!showFontColorMenu); setShowFontMenu(false); }} className={`p-1.5 rounded ${showFontColorMenu ? 'bg-indigo-100 text-indigo-600' : 'hover:bg-slate-100 text-slate-600'}`}><Palette size={16} /></button>
                        {showFontColorMenu && (
                            <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 bg-white p-2 rounded-xl shadow-xl flex gap-1 z-50 border border-slate-100">
                                {EDITOR_SWATCHES.map(s => (
                                    <button key={s} onClick={() => { exec('foreColor', s); setShowFontColorMenu(false); }} className="w-5 h-5 rounded-full border border-slate-200" style={{ backgroundColor: s }} />
                                ))}
                            </div>
                        )}
                    </div>
                    <div className="w-px h-5 bg-slate-200 mx-1" />
                    <button onClick={onClose} className="p-1.5 rounded hover:bg-red-50 text-slate-400 hover:text-red-500"><X size={16} /></button>
                </div>,
                document.body
            );
        };

        const DraggableResizable = ({ id, position, size, zIndex, isSelected, isMinimized = false, isSpotlighted = false, isGridEnabled = false, widgetType, onUpdate, onSelect, onRemove, onFontSizeChange, onMinimizeToggle, onSpotlight, onSettings, children, chromeless = false, isGlassy = false, onToggleGlass }) => {
            const [isDragging, setIsDragging] = useState(false);
            const [isResizing, setIsResizing] = useState(false);
            const [resizeDirection, setResizeDirection] = useState(null);
            const startMousePos = useRef({ x: 0, y: 0 });
            const startWidgetPos = useRef({ x: 0, y: 0 });
            const startWidgetSize = useRef({ width: 0, height: 0 });

            const handleMouseDown = (e) => {
                if (e.target.closest('button, input, select, [contenteditable="true"], .no-drag')) return;
                e.stopPropagation();
                onSelect(id);
                setIsDragging(true);
                startMousePos.current = { x: e.clientX, y: e.clientY };
                startWidgetPos.current = { ...position };
            };

            const handleResizeStart = (e, direction) => {
                if (isMinimized) return;
                e.stopPropagation();
                e.preventDefault();
                onSelect(id);
                setIsResizing(true);
                setResizeDirection(direction);
                startMousePos.current = { x: e.clientX, y: e.clientY };
                startWidgetPos.current = { ...position };
                startWidgetSize.current = { ...size };
            };

            useEffect(() => {
                if (!isDragging && !isResizing) return;
                const handleMouseMove = (e) => {
                    const dx = e.clientX - startMousePos.current.x;
                    const dy = e.clientY - startMousePos.current.y;
                    if (isDragging) {
                        onUpdate(id, { x: startWidgetPos.current.x + dx, y: startWidgetPos.current.y + dy }, size);
                    } else if (isResizing) {
                        let nw = startWidgetSize.current.width, nh = startWidgetSize.current.height;
                        if (resizeDirection.includes('e')) nw = Math.max(100, startWidgetSize.current.width + dx);
                        if (resizeDirection.includes('s')) nh = Math.max(100, startWidgetSize.current.height + dy);
                        onUpdate(id, position, { width: nw, height: nh });
                    }
                };
                const handleMouseUp = () => { setIsDragging(false); setIsResizing(false); };
                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('mouseup', handleMouseUp);
                return () => { window.removeEventListener('mousemove', handleMouseMove); window.removeEventListener('mouseup', handleMouseUp); };
            }, [isDragging, isResizing, resizeDirection]);

            return (
                <div className={`absolute flex flex-col bg-white rounded-2xl shadow-xl border overflow-hidden ${isSelected ? 'ring-2 ring-blue-500' : ''}`}
                    style={{ left: position.x, top: position.y, width: size.width, height: isMinimized ? 40 : size.height, zIndex }}
                    onMouseDown={handleMouseDown}>
                    <div className="h-10 bg-gray-50 flex items-center justify-between px-2 cursor-move border-b">
                        <span className="text-xs font-bold text-gray-500">{WIDGET_TYPE_LABELS[widgetType]}</span>
                        <div className="flex gap-1">
                            <button onClick={() => onFontSizeChange(-2)} className="p-1 hover:bg-gray-200 rounded"><Minus size={12} /></button>
                            <button onClick={() => onFontSizeChange(2)} className="p-1 hover:bg-gray-200 rounded"><Plus size={12} /></button>
                            <button onClick={() => onRemove(id)} className="p-1 hover:bg-red-100 text-red-500 rounded"><X size={12} /></button>
                        </div>
                    </div>
                    <div className="flex-1 relative overflow-hidden">{children}</div>
                    {isSelected && !isMinimized && <div className="absolute bottom-0 right-0 w-4 h-4 cursor-se-resize bg-blue-500/20" onMouseDown={e => handleResizeStart(e, 'se')} />}
                </div>
            );
        };

        const NotesWidget = ({ widget, updateData, isGlassy, chromeless, isSelected }) => {
            const data = widget.data || {};
            const { items = [], content = "", mode = 'text', fontSize = 16, color = 'yellow', textColor = 'inherit', fontFamily = 'Poppins', listTitle = "" } = data;
            const [newItemText, setNewItemText] = useState("");
            const editorRef = useRef(null);
            const [formats, setFormats] = useState({ bold: false, italic: false, underline: false });
            const [toolbarPos, setToolbarPos] = useState(null);
            const [showColorMenu, setShowColorMenu] = useState(false);
            const [showFontColorMenu, setShowFontColorMenu] = useState(false);
            const [showFontMenu, setShowFontMenu] = useState(false);

            const updateFormats = useCallback(() => {
                setFormats({
                    bold: document.queryCommandState('bold'),
                    italic: document.queryCommandState('italic'),
                    underline: document.queryCommandState('underline')
                });
                const selection = window.getSelection();
                if (selection && selection.rangeCount > 0 && !selection.isCollapsed && editorRef.current?.contains(selection.anchorNode)) {
                    const range = selection.getRangeAt(0);
                    const rect = range.getBoundingClientRect();
                    setToolbarPos({ top: rect.top, left: rect.left + rect.width / 2 });
                } else {
                    setToolbarPos(null);
                }
            }, []);

            const exec = (command, value = null) => {
                editorRef.current?.focus();
                document.execCommand(command, false, value);
                updateFormats();
                if (editorRef.current) updateData(widget.id, { content: editorRef.current.innerHTML });
            };

            useEffect(() => {
                if (mode === 'text' && editorRef.current && document.activeElement !== editorRef.current) {
                    if (editorRef.current.innerHTML !== (content || '')) {
                        editorRef.current.innerHTML = content || '';
                    }
                }
            }, [content, mode]);

            const COLORS = {
                yellow: { bg: 'bg-yellow-100', header: 'bg-yellow-100', text: 'text-yellow-900', border: 'border-yellow-300' },
                blue: { bg: 'bg-blue-50', header: 'bg-blue-100', text: 'text-blue-900', border: 'border-blue-300' }
            };
            const theme = COLORS[color] || COLORS.yellow;

            return (
                <div className={`h-full flex flex-col relative ${theme.bg}`}>
                    {/* Recent changes from index.html should be reflected here */}
                    <div className="flex-1 relative overflow-hidden flex flex-col" onMouseDown={e => { if (isSelected && mode === 'text') e.stopPropagation(); }}>
                        {mode === 'text' ? (
                            <div
                                ref={editorRef}
                                className="w-full h-full p-4 outline-none overflow-auto custom-scrollbar leading-relaxed"
                                contentEditable
                                suppressContentEditableWarning
                                onInput={(e) => updateData(widget.id, { content: e.currentTarget.innerHTML })}
                                onKeyUp={updateFormats}
                                onMouseUp={updateFormats}
                                onMouseDown={(e) => {
                                    if (document.activeElement === editorRef.current) {
                                        e.stopPropagation();
                                    }
                                    setToolbarPos(null);
                                }}
                                style={{ fontSize: fontSize + 'px', fontFamily: `${fontFamily}, sans-serif` }}
                                placeholder="Type a note..."
                            />
                        ) : (
                            <div className="flex-1 overflow-y-auto custom-scrollbar p-2 pl-4 z-10">
                                <div className="space-y-1">
                                    {items.map((item, idx) => (
                                        <div key={item.id} className={`flex items-start gap-2 p-1 rounded hover:bg-black/5 transition-colors ${item.completed ? 'opacity-50' : ''}`}>
                                            <button onClick={() => toggleItem(item.id)} className={`mt-1 w-4 h-4 rounded border flex items-center justify-center shrink-0 transition-colors ${item.completed ? 'bg-green-500 border-green-500' : 'border-gray-400 bg-white'}`}>
                                                {item.completed && <Check size={10} className="text-white" />}
                                            </button>
                                            <textarea
                                                value={item.text}
                                                rows={1}
                                                onChange={(e) => updateItemText(item.id, e.target.value)}
                                                onInput={(e) => {
                                                    e.target.style.height = 'auto';
                                                    e.target.style.height = e.target.scrollHeight + 'px';
                                                }}
                                                className={`flex-1 bg-transparent border-none outline-none text-sm font-medium break-words leading-relaxed pt-0.5 resize-none overflow-hidden ${item.completed ? 'line-through text-gray-500' : 'text-slate-800'}`}
                                                style={{ fontSize: fontSize + 'px', height: 'auto' }}
                                                ref={(el) => {
                                                    if (el) {
                                                        el.style.height = 'auto';
                                                        el.style.height = el.scrollHeight + 'px';
                                                    }
                                                }}
                                            />
                                            <button onClick={() => deleteItem(item.id)} className="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><X size={14} /></button>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-4 flex gap-2">
                                    <button onClick={() => updateData(widget.id, { items: [...items, { id: Date.now(), text: '', completed: false }] })} className="text-xs font-bold text-slate-500 hover:text-indigo-600">+ Add Item</button>
                                    <button onClick={() => updateData(widget.id, { mode: 'text' })} className="text-xs font-bold text-slate-500 hover:text-indigo-600">Text Mode</button>
                                </div>
                            </div>
                        )}
                        <FloatingFormattingToolbar
                            pos={toolbarPos} formats={formats} exec={exec} onClose={() => setToolbarPos(null)}
                            updateData={updateData} widgetId={widget.id} fontFamily={fontFamily}
                            showFontColorMenu={showFontColorMenu} setShowFontColorMenu={setShowFontColorMenu}
                            showFontMenu={showFontMenu} setShowFontMenu={setShowFontMenu}
                        />
                    </div>
                </div>
            );
        };

        const App = () => {
            const [widgets, setWidgets] = useState([
                { id: '1', type: 'TEXT', position: { x: 50, y: 50 }, size: { width: 400, height: 300 }, zIndex: 100, data: { content: 'Hello Sandbox!', fontSize: 18 } }
            ]);
            const [selectedId, setSelectedId] = useState('1');

            const updateWidgetLayout = (id, newPos, newSize) => {
                setWidgets(prev => prev.map(w => w.id === id ? { ...w, position: newPos, size: newSize } : w));
            };

            const updateWidgetData = (id, updates) => {
                setWidgets(prev => prev.map(w => w.id === id ? { ...w, data: { ...w.data, ...updates } } : w));
            };

            return (
                <div className="w-full h-full">
                    <h1 className="text-2xl font-bold mb-4">NotesWidget Sandbox</h1>
                    <p className="text-sm text-gray-600 mb-8">Test auto-resizing textareas and list mode.</p>
                    <div className="relative border-4 border-dashed border-gray-300 rounded-xl" style={{ height: '600px' }}>
                        {widgets.map(w => (
                            <DraggableResizable
                                key={w.id} id={w.id} position={w.position} size={w.size} zIndex={w.zIndex}
                                isSelected={selectedId === w.id} widgetType={w.type}
                                onSelect={setSelectedId} onUpdate={updateWidgetLayout} onRemove={() => { }}
                                onFontSizeChange={(d) => updateWidgetData(w.id, { fontSize: (w.data.fontSize || 16) + d })}
                            >
                                <NotesWidget widget={w} updateData={updateWidgetData} isSelected={selectedId === w.id} />
                            </DraggableResizable>
                        ))}
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
