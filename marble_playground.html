<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HomeRoom Jar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Lexend:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
    <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.447.0?deps=react@18.2.0"
    }
  }
  </script>
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #0f172a;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div id="root" class="w-full h-full flex items-center justify-center p-8"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Settings, Minus, Plus, RefreshCw, Trash2, X, Check } from 'lucide-react';

        // --- MOCK DATA & CONSTANTS ---
        const MARBLE_THEMES = {
            classic: { name: 'Classic', items: ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'], type: 'color', shape: 'circle' },
            sports: { name: 'Sports', items: ['⚽', '🏀', '🏈', '⚾', '🎾'], type: 'emoji', shape: 'circle' },
            minecraft: {
                name: 'Minecraft',
                items: [
                    { emoji: '🟫', color: '#795548', name: 'Dirt' },
                    { emoji: '🧱', color: '#90a4ae', name: 'Cobblestone' },
                    { emoji: '🪨', color: '#cfd8dc', name: 'Stone' },
                    { emoji: '🟥', color: '#d32f2f', name: 'Redstone' },
                    { emoji: '💎', color: '#4fc3f7', name: 'Diamond' }
                ],
                type: 'mixed',
                shape: 'rectangle'
            },
            emojis: { name: 'Emojis', items: ['😀', '😎', '🤩', '🌈', '🔥', '✨', '🎈', '❤️'], type: 'emoji', shape: 'circle' },
            money: { name: 'Money!', items: ['💵', '💰', '🪙', '💎', '💳', '🤑', '🏦'], type: 'emoji', shape: 'circle' },
            candy: { name: 'Candy', items: ['🍬', '🍭', '🍩', '🍫', '🍪'], type: 'emoji', shape: 'circle' }
        };

        const MARBLE_SOUNDS = {
            pop: { id: 'pop', name: 'Pop', url: 'https://cdn.freesound.org/previews/244/244655_3633604-lq.mp3' },
            glass: { id: 'glass', name: 'Glass', url: 'https://cdn.freesound.org/previews/336/336829_5730419-lq.mp3' },
            clatter: { id: 'clatter', name: 'Clatter', url: 'https://cdn.freesound.org/previews/616/616113_11539463-lq.mp3' },
            ding: { id: 'ding', name: 'Ding', url: 'https://cdn.freesound.org/previews/320/320655_5260872-lq.mp3' }
        };

        const JAR_COLORS = {
            standard: { bg: 'bg-white/10', border: 'border-white/20' },
            gold: { bg: 'bg-yellow-900/40', border: 'border-yellow-700/50' },
            night: { bg: 'bg-indigo-950/60', border: 'border-indigo-500/50' },
            forest: { bg: 'bg-emerald-950/60', border: 'border-emerald-500/50' },
            rose: { bg: 'bg-rose-950/60', border: 'border-rose-500/50' }
        };

        // --- MARBLE JAR WIDGET ---
        const MarbleJarWidget = ({ widget, updateData, activeRosterId = 'default', allRosters = [], onClassChange }) => {
            const containerRef = useRef(null);
            const canvasRef = useRef(null);
            const engineRef = useRef(null);
            const renderRef = useRef(null);
            const runnerRef = useRef(null);
            const [showSettings, setShowSettings] = useState(false);

            const {
                title = 'HomeRoom Jar',
                rosterCounts = {},
                goalCount = 50,
                theme = 'classic',
                sound = 'glass',
                jarColor = 'standard'
            } = widget.data || {};

            const [viewRosterId, setViewRosterId] = useState(activeRosterId);

            // Sync with parent active roster
            useEffect(() => {
                if (activeRosterId && activeRosterId !== viewRosterId) {
                    setViewRosterId(activeRosterId);
                }
            }, [activeRosterId]);

            const currentCount = rosterCounts[viewRosterId] || 0;
            const marbleRadius = useMemo(() => Math.max(15, Math.min(40, 220 / Math.sqrt(goalCount))), [goalCount]);

            // Physics Engine Initialization
            useEffect(() => {
                if (!containerRef.current || !canvasRef.current) return;

                const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
                const engine = Engine.create({
                    enableSleeping: true
                });
                engineRef.current = engine;

                const render = Render.create({
                    canvas: canvasRef.current,
                    engine: engine,
                    options: {
                        width: containerRef.current.clientWidth,
                        height: containerRef.current.clientHeight,
                        wireframes: false,
                        background: 'transparent',
                        pixelRatio: window.devicePixelRatio || 1
                    }
                });
                renderRef.current = render;

                // Custom render for emojis
                Events.on(render, 'afterRender', () => {
                    const context = render.context;
                    const ratio = render.options.pixelRatio || 1;
                    const bodies = Composite.allBodies(engine.world);

                    context.save();
                    if (ratio !== 1) {
                        context.scale(ratio, ratio);
                    }

                    bodies.forEach(body => {
                        if (body.label === 'marble' && body.render.emoji) {
                            const { x, y } = body.position;
                            const size = body.render.emojiSize || marbleRadius * 2.2;
                            context.save();
                            context.translate(x, y);
                            context.rotate(body.angle);
                            context.font = `${size}px "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif`;
                            context.textAlign = 'center';
                            context.textBaseline = 'middle';
                            context.fillStyle = 'white'; // Ensure emoji contrast if needed
                            context.fillText(body.render.emoji, 0, 0);
                            context.restore();
                        }
                    });

                    context.restore();
                });

                const thickness = 100;
                const width = containerRef.current.clientWidth;
                const height = containerRef.current.clientHeight;

                const ground = Bodies.rectangle(width / 2, height + thickness / 2 - 5, width * 2, thickness, { isStatic: true, render: { visible: false } });
                const leftWall = Bodies.rectangle(-thickness / 2 + 5, height / 2, thickness, height * 2, { isStatic: true, render: { visible: false } });
                const rightWall = Bodies.rectangle(width + thickness / 2 - 5, height / 2, thickness, height * 2, { isStatic: true, render: { visible: false } });

                // Add a listener to stop body movement after a while to prevent jitter
                Events.on(engine, 'afterUpdate', () => {
                    const bodies = Composite.allBodies(engine.world).filter(b => b.label === 'marble');
                    bodies.forEach(body => {
                        // If moving very slowly, make it sleep
                        if (body.speed < 0.2 && body.angularSpeed < 0.2) {
                            Matter.Sleeping.set(body, true);
                        }
                    });
                });

                Composite.add(engine.world, [ground, leftWall, rightWall]);

                const runner = Runner.create();
                runnerRef.current = runner;
                Runner.run(runner, engine);
                Render.run(render);

                const handleResize = () => {
                    if (containerRef.current && renderRef.current) {
                        const newWidth = containerRef.current.clientWidth;
                        const newHeight = containerRef.current.clientHeight;
                        renderRef.current.options.width = newWidth;
                        renderRef.current.options.height = newHeight;
                        renderRef.current.canvas.width = newWidth;
                        renderRef.current.canvas.height = newHeight;

                        // Update wall positions
                        Matter.Body.setPosition(ground, { x: newWidth / 2, y: newHeight + thickness / 2 - 5 });
                        Matter.Body.setPosition(leftWall, { x: -thickness / 2 + 5, y: newHeight / 2 });
                        Matter.Body.setPosition(rightWall, { x: newWidth + thickness / 2 - 5, y: newHeight / 2 });
                    }
                };

                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    Render.stop(render);
                    Runner.stop(runner);
                    Engine.clear(engine);
                    if (render.canvas) render.canvas.remove();
                };
            }, [theme, goalCount]); // Initialize only ONCE

            // Helper to spawn a single marble
            const spawnMarble = (x, y, skipSound = false) => {
                if (!engineRef.current) return;
                const { Bodies, Composite } = Matter;
                const themeData = MARBLE_THEMES[theme];

                let item;
                if (themeData.type === 'mixed') {
                    item = themeData.items[Math.floor(Math.random() * themeData.items.length)];
                } else {
                    const value = themeData.items[Math.floor(Math.random() * themeData.items.length)];
                    item = { [themeData.type]: value, shape: themeData.shape || 'circle' };
                }

                const shape = item.shape || 'circle';
                let body;

                const renderOptions = {
                    visible: !!item.texture || themeData.type === 'color' || themeData.type === 'mixed',
                    fillStyle: item.color || (themeData.type === 'color' ? item.color || item : 'transparent'),
                    strokeStyle: themeData.type === 'color' ? 'rgba(255,255,255,0.4)' : 'transparent',
                    lineWidth: 2,
                    emoji: typeof item === 'object' ? item.emoji : (themeData.type === 'emoji' ? item : null)
                };

                if (item.texture) {
                    renderOptions.sprite = {
                        texture: item.texture,
                        xScale: (item.width || marbleRadius * 2) / 100,
                        yScale: (item.height || marbleRadius * 2) / 100
                    };
                }

                if (shape === 'rectangle') {
                    const w = item.width || marbleRadius * 2;
                    const h = item.height || marbleRadius * 2;
                    body = Bodies.rectangle(x, y, w, h, {
                        restitution: 0.3,
                        friction: 0.1,
                        label: 'marble',
                        render: { ...renderOptions, emojiSize: Math.max(w, h) }
                    });
                } else {
                    body = Bodies.circle(x, y, marbleRadius, {
                        restitution: 0.4,
                        friction: 0.05,
                        label: 'marble',
                        render: renderOptions
                    });
                }

                Composite.add(engineRef.current.world, body);

                if (!skipSound) {
                    const soundEffect = new Audio(MARBLE_SOUNDS[sound].url);
                    soundEffect.volume = 0.3;
                    soundEffect.play().catch(e => { });
                }
            };

            // Sync marbles with state
            useEffect(() => {
                if (!engineRef.current || !containerRef.current) return;

                const { Composite } = Matter;
                const currentBodies = Composite.allBodies(engineRef.current.world).filter(b => b.label === 'marble');

                if (currentBodies.length < currentCount) {
                    // Need to add marbles
                    const toAdd = currentCount - currentBodies.length;
                    const width = containerRef.current.clientWidth;
                    const height = containerRef.current.clientHeight;

                    for (let i = 0; i < toAdd; i++) {
                        // If it's the initial load, space them out. If it's a click, drop from top.
                        const isInitial = currentBodies.length === 0;
                        const x = isInitial ? (width * 0.2 + Math.random() * width * 0.6) : (width / 2 + (Math.random() * 40 - 20));
                        const y = isInitial ? (height * 0.2 + Math.random() * height * 0.5) : -50;
                        spawnMarble(x, y, isInitial);
                    }
                } else if (currentBodies.length > currentCount) {
                    // Need to remove marbles (e.g. empty jar)
                    const toRemove = currentBodies.length - currentCount;
                    for (let i = 0; i < toRemove; i++) {
                        Composite.remove(engineRef.current.world, currentBodies[i]);
                    }
                }
            }, [currentCount, viewRosterId, theme]); // Sync when count, class, OR theme changes (theme re-inits engine)

            // Handle Theme/Radius changes without resetting engine
            useEffect(() => {
                if (!engineRef.current) return;
                const { Composite, Body } = Matter;
                const bodies = Composite.allBodies(engineRef.current.world).filter(b => b.label === 'marble');
                const themeData = MARBLE_THEMES[theme];

                bodies.forEach(body => {
                    const item = themeData.items[Math.floor(Math.random() * themeData.items.length)];

                    // Update render properties
                    body.render.visible = !!item.texture || themeData.type === 'color' || themeData.type === 'mixed';
                    body.render.fillStyle = item.color || (themeData.type === 'color' ? item : 'transparent');
                    body.render.strokeStyle = themeData.type === 'color' ? 'rgba(255,255,255,0.4)' : 'transparent';
                    body.render.emoji = typeof item === 'object' ? item.emoji : (themeData.type === 'emoji' ? item : null);

                    if (item.texture) {
                        body.render.sprite = {
                            texture: item.texture,
                            xScale: (item.width || marbleRadius * 2) / 100,
                            yScale: (item.height || marbleRadius * 2) / 100
                        };
                    } else {
                        delete body.render.sprite; // Remove sprite if no texture
                    }

                    // Update scale if radius changed (ONLY for circles)
                    if (body.circleRadius) {
                        const currentRadius = body.circleRadius;
                        const scaleFactor = marbleRadius / currentRadius;
                        Body.scale(body, scaleFactor, scaleFactor);
                    }
                });
            }, [theme, marbleRadius]);

            const handleAddMarble = () => {
                const newCounts = { ...rosterCounts, [viewRosterId]: currentCount + 1 };
                updateData(widget.id, { rosterCounts: newCounts });
            };

            const handleClassChange = (newId) => {
                setViewRosterId(newId);
                if (onClassChange) onClassChange(newId);
            };

            return (
                <div ref={containerRef} className={`w-full h-full flex flex-col relative overflow-hidden backdrop-blur-xl border ${JAR_COLORS[jarColor].bg} ${JAR_COLORS[jarColor].border} rounded-3xl shadow-2xl transition-all duration-700`}>
                    <div className="absolute inset-0 pointer-events-none bg-gradient-to-tr from-white/5 via-transparent to-white/5 z-10" />

                    {/* Top Bar */}
                    <div className="absolute top-0 left-0 right-0 h-12 flex items-center justify-between px-4 bg-white/5 border-b border-white/10 backdrop-blur-md rounded-t-3xl z-30">
                        <div className="flex items-center gap-2">
                            <div className="w-2 h-2 rounded-full bg-blue-400 animate-pulse" />
                            <span className="text-[10px] font-black text-white/40 uppercase tracking-[0.2em]">Jar Active</span>
                        </div>
                        <button
                            onClick={() => setShowSettings(!showSettings)}
                            className={`p-2 rounded-xl transition-all ${showSettings ? 'bg-white/20 text-white rotate-90' : 'text-white/50 hover:text-white hover:bg-white/10'}`}
                        >
                            <Settings size={18} />
                        </button>
                    </div>

                    {/* Main Display */}
                    <div className="p-8 pt-16 z-20 flex flex-col items-center">
                        <input
                            type="text"
                            value={title}
                            onChange={(e) => updateData(widget.id, { title: e.target.value })}
                            className="bg-transparent text-center text-3xl font-black text-white placeholder-white/20 border-b-2 border-transparent focus:border-white/20 focus:outline-none w-full transition-all drop-shadow-2xl"
                            placeholder="Set Your Goal..."
                        />
                        <div className="mt-4 flex flex-col items-center gap-2">
                            <div className="px-5 py-2 bg-black/20 backdrop-blur-xl rounded-full text-xs font-black text-white border border-white/10 shadow-2xl">
                                <span className="text-white/40 uppercase tracking-widest mr-2">Goal:</span>
                                <span className="text-blue-400">{currentCount}</span>
                                <span className="mx-2 text-white/20">/</span>
                                <span className="text-white/60">{goalCount}</span>
                            </div>
                            <div className="w-40 h-2 bg-black/20 rounded-full overflow-hidden border border-white/5 p-[1px] shadow-inner">
                                <div
                                    className="h-full bg-gradient-to-r from-blue-400 via-indigo-500 to-purple-500 rounded-full transition-all duration-1000 ease-out shadow-[0_0_10px_rgba(59,130,246,0.5)]"
                                    style={{ width: `${Math.min(100, (currentCount / goalCount) * 100)}%` }}
                                />
                            </div>
                        </div>
                    </div>

                    <canvas ref={canvasRef} className="absolute inset-0 z-0 opacity-100" />

                    {/* Add Button */}
                    {!showSettings && (
                        <div className="absolute bottom-10 left-0 right-0 flex justify-center z-40">
                            <button
                                onClick={handleAddMarble}
                                className="group relative flex items-center justify-center w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-700 text-white rounded-full shadow-[0_15px_30px_rgba(0,0,0,0.3),0_0_20px_rgba(59,130,246,0.3)] hover:shadow-[0_20px_40px_rgba(0,0,0,0.4),0_0_40px_rgba(59,130,246,0.5)] hover:scale-105 active:scale-95 transition-all duration-300"
                            >
                                <div className="text-4xl transform group-hover:rotate-12 transition-transform drop-shadow-lg flex items-center justify-center">
                                    {MARBLE_THEMES[theme].type === 'color' ? (
                                        <div className="w-10 h-10 rounded-full shadow-inner border-2 border-white/30" style={{ backgroundColor: typeof MARBLE_THEMES[theme].items[0] === 'string' ? MARBLE_THEMES[theme].items[0] : (MARBLE_THEMES[theme].items[0].color || '#3b82f6') }} />
                                    ) : (
                                        MARBLE_THEMES[theme].items[0].emoji || MARBLE_THEMES[theme].items[0]
                                    )}
                                </div>
                                <div className="absolute -top-12 scale-0 group-hover:scale-100 bg-white text-indigo-900 text-[10px] font-black px-4 py-2 rounded-2xl transition-all duration-300 whitespace-nowrap shadow-2xl border border-white flex items-center gap-2 uppercase tracking-widest">
                                    Add One <Plus size={12} />
                                </div>
                            </button>
                        </div>
                    )}

                    {/* Settings Overlay */}
                    {showSettings && (
                        <div className="absolute inset-0 bg-slate-950/90 backdrop-blur-2xl z-50 flex flex-col">
                            {/* Sticky Header */}
                            <div className="p-6 pb-4 border-b border-white/10 flex items-center justify-between">
                                <h3 className="text-white text-sm font-black uppercase tracking-[0.2em] flex items-center gap-3">
                                    <div className="p-1.5 bg-blue-500 rounded-lg"><Settings size={14} /></div>
                                    Jar Settings
                                </h3>
                                <button onClick={() => setShowSettings(false)} className="p-2 hover:bg-white/10 rounded-full text-white/50 hover:text-white transition-all">
                                    <X size={20} />
                                </button>
                            </div>

                            {/* Scrollable Content */}
                            <div className="flex-1 overflow-y-auto p-6 custom-scrollbar space-y-8">
                                <div>
                                    <label className="text-[10px] text-white/40 font-black uppercase mb-3 block tracking-widest">Selected Class</label>
                                    <div className="grid grid-cols-1 gap-2">
                                        {allRosters.map(r => (
                                            <button
                                                key={r.id}
                                                onClick={() => handleClassChange(r.id)}
                                                className={`flex items-center justify-between px-4 py-3 rounded-2xl border transition-all ${viewRosterId === r.id ? 'bg-blue-600/20 border-blue-500/50 text-white' : 'bg-white/5 border-white/5 text-white/50 hover:bg-white/10'}`}
                                            >
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-2 h-2 rounded-full ${viewRosterId === r.id ? 'bg-blue-400 shadow-[0_0_8px_rgba(96,165,250,0.8)]' : 'bg-white/10'}`} />
                                                    <span className="text-sm font-bold">{r.name}</span>
                                                </div>
                                                {viewRosterId === r.id && <Check size={16} className="text-blue-400" />}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] text-white/40 font-black uppercase mb-3 block tracking-widest">Goal Count</label>
                                        <div className="flex items-center gap-3 bg-white/5 rounded-2xl p-3 border border-white/10">
                                            <button
                                                onClick={() => updateData(widget.id, { goalCount: Math.max(1, goalCount - 5) })}
                                                className="w-12 h-12 flex items-center justify-center bg-slate-700 hover:bg-slate-600 rounded-xl text-white transition-all shadow-lg active:scale-90 border border-white/10"
                                            >
                                                <Minus size={22} strokeWidth={3} />
                                            </button>
                                            <input
                                                type="number"
                                                value={goalCount}
                                                onFocus={(e) => e.target.select()}
                                                onChange={(e) => {
                                                    const val = parseInt(e.target.value);
                                                    if (!isNaN(val)) updateData(widget.id, { goalCount: Math.max(1, val) });
                                                }}
                                                className="flex-1 bg-white/5 mx-2 rounded-xl py-2 text-center text-2xl font-black text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50"
                                            />
                                            <button
                                                onClick={() => updateData(widget.id, { goalCount: goalCount + 5 })}
                                                className="w-12 h-12 flex items-center justify-center bg-blue-600 hover:bg-blue-500 rounded-xl text-white transition-all shadow-lg active:scale-90 border border-blue-400/50"
                                            >
                                                <Plus size={22} strokeWidth={3} />
                                            </button>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-[10px] text-white/40 font-black uppercase mb-3 block tracking-widest">Jar Tint</label>
                                        <div className="flex flex-wrap gap-4 pt-1">
                                            {Object.entries(JAR_COLORS).map(([id, color]) => (
                                                <button
                                                    key={id}
                                                    onClick={() => updateData(widget.id, { jarColor: id })}
                                                    className={`w-12 h-12 rounded-full border-2 transition-all ${jarColor === id ? 'border-white scale-110 shadow-[0_0_20px_rgba(255,255,255,0.4)]' : 'border-transparent opacity-40 hover:opacity-100'}`}
                                                    style={{ background: id === 'standard' ? 'rgba(255,255,255,0.2)' : id === 'gold' ? '#fbbf24' : id === 'night' ? '#312e81' : id === 'forest' ? '#064e3b' : '#be123c' }}
                                                />
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <label className="text-[10px] text-white/40 font-black uppercase mb-3 block tracking-widest">Marble Theme</label>
                                    <div className="grid grid-cols-3 gap-3">
                                        {Object.entries(MARBLE_THEMES).map(([id, t]) => (
                                            <button
                                                key={id}
                                                onClick={() => updateData(widget.id, { theme: id })}
                                                className={`p-4 rounded-2xl border transition-all flex flex-col items-center gap-2 ${theme === id ? 'bg-indigo-600 border-indigo-400 scale-105 shadow-xl' : 'bg-white/5 border-white/5 hover:bg-white/10 hover:border-white/10'}`}
                                            >
                                                <span className="text-2xl drop-shadow-lg">
                                                    {t.type === 'color' ? (
                                                        <div className="w-8 h-8 rounded-full border border-white/30" style={{ backgroundColor: t.items[0] }} />
                                                    ) : (
                                                        t.items[0].emoji || t.items[0]
                                                    )}
                                                </span>
                                                <span className="text-[9px] font-black text-white/60 uppercase tracking-tighter">{t.name}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <label className="text-[10px] text-white/40 font-black uppercase mb-3 block tracking-widest">Collision Sound</label>
                                    <div className="flex flex-wrap gap-2">
                                        {Object.entries(MARBLE_SOUNDS).map(([id, s]) => (
                                            <button
                                                key={id}
                                                onClick={() => {
                                                    updateData(widget.id, { sound: id });
                                                    const a = new Audio(s.url);
                                                    a.volume = 0.4;
                                                    a.play().catch(() => { });
                                                }}
                                                className={`px-4 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${sound === id ? 'bg-indigo-600 text-white shadow-xl translate-y-[-2px]' : 'bg-white/5 text-white/40 hover:bg-white/10 hover:text-white'}`}
                                            >
                                                {s.name}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="pt-4">
                                    <button
                                        onClick={() => {
                                            if (confirm('Are you sure you want to empty the jar for this class?')) {
                                                const newCounts = { ...rosterCounts, [viewRosterId]: 0 };
                                                updateData(widget.id, { rosterCounts: newCounts });
                                                // Success feedback could be added here if desired
                                            }
                                        }}
                                        className="w-full py-4 bg-red-500/10 hover:bg-red-500/20 text-red-400 text-[10px] font-black uppercase tracking-[0.2em] rounded-2xl border border-red-500/20 transition-all flex items-center justify-center gap-3"
                                    >
                                        <Trash2 size={14} /> Reset Progress
                                    </button>
                                </div>
                            </div>

                            {/* Sticky Footer */}
                            <div className="p-6 border-t border-white/10 bg-slate-900/50">
                                <button
                                    onClick={() => setShowSettings(false)}
                                    className="w-full py-4 bg-gradient-to-r from-blue-500 to-indigo-600 rounded-2xl text-white font-black text-xs uppercase tracking-[0.3em] hover:shadow-[0_0_30px_rgba(59,130,246,0.4)] active:scale-[0.98] transition-all"
                                >
                                    Apply & Close
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- APP WRAPPER ---
        const App = () => {
            const [widget, setWidget] = useState(() => {
                const saved = localStorage.getItem('homeroom-jar-state');
                if (saved) {
                    try {
                        return JSON.parse(saved);
                    } catch (e) {
                        console.error('Failed to parse saved state', e);
                    }
                }
                return {
                    id: 'demo-marble-jar',
                    data: {
                        title: 'HomeRoom Jar',
                        rosterCounts: { 'class-a': 0, 'class-b': 0, 'class-c': 0 },
                        goalCount: 25,
                        theme: 'classic',
                        sound: 'glass',
                        jarColor: 'standard'
                    }
                };
            });

            const [activeRosterId, setActiveRosterId] = useState(() => {
                return localStorage.getItem('homeroom-jar-active-roster') || 'class-a';
            });

            useEffect(() => {
                localStorage.setItem('homeroom-jar-state', JSON.stringify(widget));
            }, [widget]);

            useEffect(() => {
                localStorage.setItem('homeroom-jar-active-roster', activeRosterId);
            }, [activeRosterId]);

            const MOCK_ROSTERS = [
                { id: 'class-a', name: 'Period 1: Math' },
                { id: 'class-b', name: 'Period 2: Science' },
                { id: 'class-c', name: 'Period 3: History' }
            ];

            const updateData = (id, newData) => {
                setWidget(prev => ({ ...prev, data: { ...prev.data, ...newData } }));
            };

            return (
                <div className="flex flex-col gap-6 w-full h-full max-w-5xl mx-auto py-8">
                    {/* Controls */}
                    <div className="bg-slate-900/80 backdrop-blur-xl p-5 rounded-3xl flex items-center justify-between shadow-2xl border border-white/10">
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center shadow-lg">
                                    <span className="text-xl">🏺</span>
                                </div>
                                <h1 className="text-2xl font-black bg-gradient-to-r from-white via-blue-100 to-blue-300 bg-clip-text text-transparent tracking-tight">HomeRoom Jar</h1>
                            </div>

                            <div className="h-8 w-px bg-white/10" />

                            <div className="flex flex-col">
                                <span className="text-[10px] font-black text-white/30 uppercase tracking-[0.2em] mb-1">Active Roster</span>
                                <select
                                    value={activeRosterId}
                                    onChange={(e) => setActiveRosterId(e.target.value)}
                                    className="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm font-bold text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all cursor-pointer hover:bg-white/10"
                                >
                                    {MOCK_ROSTERS.map(r => <option key={r.id} value={r.id} className="bg-slate-900">{r.name}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="flex items-center gap-4">
                            <div className="px-4 py-2 bg-blue-500/10 border border-blue-500/20 rounded-xl">
                                <span className="text-[10px] font-black text-blue-400 uppercase tracking-widest">Pro Version</span>
                            </div>
                        </div>
                    </div>

                    {/* Widget Container */}
                    <div className="flex-1 relative flex items-center justify-center bg-slate-900/30 rounded-[3rem] border border-white/5 backdrop-blur-sm p-12 overflow-hidden">
                        {/* Background blobs for aesthetics */}
                        <div className="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600/10 blur-[120px] rounded-full" />
                        <div className="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-600/10 blur-[120px] rounded-full" />

                        <div style={{ width: 480, height: 680 }} className="relative z-10 transition-transform duration-500 hover:scale-[1.01]">
                            <MarbleJarWidget
                                widget={widget}
                                updateData={updateData}
                                activeRosterId={activeRosterId}
                                allRosters={MOCK_ROSTERS}
                                onClassChange={setActiveRosterId}
                            />
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
