    const WebcamWidget = ({ widget, updateData }) => {
      const { isMirrored = true, isActive = true } = widget.data;
      const videoRef = useRef(null);
      const streamRef = useRef(null);

      const takePhoto = () => {
        if (videoRef.current) {
          const canvas = document.createElement('canvas');
          canvas.width = videoRef.current.videoWidth;
          canvas.height = videoRef.current.videoHeight;
          const ctx = canvas.getContext('2d');
          if (isMirrored) {
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
          }
          ctx.drawImage(videoRef.current, 0, 0);
          const link = document.createElement('a');
          link.download = `photo-${Date.now()}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
        }
      };

      useEffect(() => {
        const startCamera = async () => {
          if (isActive) {
            try {
              const stream = await navigator.mediaDevices.getUserMedia({ video: true });
              streamRef.current = stream;
              if (videoRef.current) {
                videoRef.current.srcObject = stream;
              }
            } catch (e) {
              console.error("Camera Error:", e);
              updateData(widget.id, { isActive: false });
            }
          } else {
            stopCamera();
          }
        };
        startCamera();
        return () => {
          stopCamera();
        };
      }, [isActive]);

      const stopCamera = () => {
        if (streamRef.current) {
          streamRef.current.getTracks().forEach(track => track.stop());
          streamRef.current = null;
        }
        if (videoRef.current) {
          videoRef.current.srcObject = null;
        }
      };

      return (
        <div className="w-full h-full bg-black relative flex flex-col group overflow-hidden">

              <div className="text-white/50 text-center flex flex-col items-center">

            )}
          </div>

              )}
            </div>

        </div>

      '\u{1F308}', '\u{1F30B}', '\u{1F31F}', '\u{1F33B}', '\u{1F33F}', '\u{1F340}', '\u{1F341}', '\u{1F342}', '\u{1F343}', '\u{1F344}', '\u{1F345}', '\u{1F346}', '\u{1F347}', '\u{1F348}', '\u{1F349}'

    const ScheduleWidget = ({ widget, updateData, onOpenSettings, selectedDate, setSelectedDate, scheduleTemplate, setScheduleTemplate, scheduleOverrides, setScheduleOverrides, scheduleSettings, setScheduleSettings }) => {
      const { fontSize = 14 } = widget.data;
      const [dragIndex, setDragIndex] = useState(null);
      const [emojiPickerIndex, setEmojiPickerIndex] = useState(null);
      const [timePickerState, setTimePickerState] = useState({ index: null, triggerRef: null });
      const [showCyclePicker, setShowCyclePicker] = useState(false);
      const [revertConfirmOpen, setRevertConfirmOpen] = useState(false);

      const viewDate = selectedDate || new Date();
      // Helper for local YYYY-MM-DD
      const toLocalISOString = (date) => {
        const offset = date.getTimezoneOffset() * 60000;
        return new Date(date.getTime() - offset).toISOString().split('T')[0];
      };

      const dateKey = toLocalISOString(viewDate);

      // --- Rotating Schedule Logic ---
      const scheduleMode = scheduleSettings?.mode || 'weekly';
      const cycleLength = scheduleSettings?.cycleLength || 6;

      const getCycleDay = (date) => {
        if (scheduleMode !== 'rotating') return null;
        const anchorStr = scheduleSettings?.anchorDate || new Date().toISOString().split('T')[0];
        const anchorDay = scheduleSettings?.anchorDay || 1;

        // Parse local YYYY-MM-DD to midnight
        const [ay, am, ad] = anchorStr.split('-').map(Number);
        const anchor = new Date(ay, am - 1, ad);
        const target = new Date(date.getFullYear(), date.getMonth(), date.getDate());

        // Business Day Diff logic
        let count = 0;
        const d = new Date(anchor);
        const sign = target > anchor ? 1 : -1;

        // Prevent infinite loop safety
        let loops = 0;
        const maxLoops = 3650; // 10 years

        while (d.getTime() !== target.getTime() && loops < maxLoops) {
          d.setDate(d.getDate() + sign);
          const day = d.getDay();
          if (day !== 0 && day !== 6) count += sign;
          loops++;
        }

        let val = (anchorDay - 1 + count) % cycleLength;
        if (val < 0) val += cycleLength;
        return val + 1;
      };

      // Determine Display Info
      let templateKey = DAYS_OF_WEEK[viewDate.getDay()];
      let displayDayName = templateKey;
      let currentCycleDay = null;

      if (scheduleMode === 'rotating') {
        currentCycleDay = getCycleDay(viewDate);
        templateKey = `Day ${currentCycleDay}`;
        displayDayName = (scheduleSettings?.dayLabels?.[currentCycleDay - 1]) || `Day ${currentCycleDay}`;
      }

      const hasOverride = scheduleOverrides && scheduleOverrides[dateKey] !== undefined;
      const items = hasOverride ? scheduleOverrides[dateKey] : ((scheduleTemplate && scheduleTemplate[templateKey]) ? scheduleTemplate[templateKey] : []);

      useEffect(() => {
        const handleClickOutside = () => { setEmojiPickerIndex(null); setTimePickerState({ index: null, triggerRef: null }); setShowCyclePicker(false); };
        if (emojiPickerIndex !== null || timePickerState.index !== null || showCyclePicker) { document.addEventListener('click', handleClickOutside); return () => document.removeEventListener('click', handleClickOutside); }
      }, [emojiPickerIndex, timePickerState.index, showCyclePicker]);

      const now = new Date();
      const currentMinutes = now.getHours() * 60 + now.getMinutes();
      const parseTimeToMinutes = (time) => { if (!time) return 0; const [h, m] = time.split(':').map(Number); return h * 60 + m; };

      const isCurrentItem = (item, index) => {
        if (toLocalISOString(now) !== dateKey) return false;
        const itemMinutes = parseTimeToMinutes(item.time);
        const nextItem = items[index + 1];
        const nextMinutes = nextItem ? parseTimeToMinutes(nextItem.time) : 24 * 60;
        return currentMinutes >= itemMinutes && currentMinutes < nextMinutes;
      };

      const saveItems = (newItems) => {
        if (setScheduleOverrides) {
          setScheduleOverrides(prev => ({ ...prev, [dateKey]: newItems }));
        }
      };

      const updateItem = (index, field, value) => { const newItems = [...items]; newItems[index] = { ...newItems[index], [field]: value }; saveItems(newItems); };
      const addItem = () => { const newItem = { id: Date.now().toString(), time: '09:00', emoji: '📚', title: 'New Activity', description: '' }; const newItems = [...items, newItem].sort((a, b) => parseTimeToMinutes(a.time) - parseTimeToMinutes(b.time)); saveItems(newItems); };
      const removeItem = (index) => { const newItems = items.filter((_, i) => i !== index); saveItems(newItems); };
      const duplicateItem = (index) => { const newItems = [...items]; const dup = { ...newItems[index], id: Date.now().toString() }; newItems.splice(index + 1, 0, dup); saveItems(newItems); };

      const handleDragStart = (index) => { setDragIndex(index); };
      const handleDragOver = (e) => { e.preventDefault(); };
      const handleDrop = (targetIndex) => { if (dragIndex === null || dragIndex === targetIndex) return; const newItems = [...items]; const [moved] = newItems.splice(dragIndex, 1); newItems.splice(targetIndex, 0, moved); saveItems(newItems); setDragIndex(null); };

        d.setDate(d.getDate() + delta);
        while (d.getDay() === 0 || d.getDay() === 6) {

        }
        if (setSelectedDate) setSelectedDate(d);
      };

      const handleDateChange = (e) => {
        if (e.target.value) {
          const [y, m, d] = e.target.value.split('-').map(Number);
          if (setSelectedDate) setSelectedDate(new Date(y, m - 1, d));

      const handleSetCycleDay = (dayNum) => {
        if (!setScheduleSettings) return;
        setScheduleSettings({
          ...scheduleSettings,
          anchorDate: toLocalISOString(viewDate),
          anchorDay: dayNum
        });
        setShowCyclePicker(false);
      };

      const revertToday = () => {
        if (revertConfirmOpen) {
          if (setScheduleOverrides) {
            setScheduleOverrides(prev => {
              const next = { ...prev };
              delete next[dateKey];
              return next;
            });
          }
          setRevertConfirmOpen(false);

          setRevertConfirmOpen(true);
          setTimeout(() => setRevertConfirmOpen(false), 3000);

                  <button onClick={(e) => { e.stopPropagation(); setShowCyclePicker(!showCyclePicker); }} className="text-[10px] text-indigo-600 font-bold uppercase tracking-wider hover:bg-indigo-50 px-1 rounded cursor-pointer relative top-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
                    Set Day
                  </button>
                )}
                {/* Weekly Mode: Date Only */}
                {scheduleMode === 'weekly' && (
                  <span className="text-[10px] text-indigo-500 font-bold uppercase tracking-wider">{viewDate.toLocaleDateString([], { month: 'short', day: 'numeric' })}</span>
                )}

                <input type="date" className="absolute inset-0 opacity-0 cursor-pointer" onChange={handleDateChange} />

                {/* Cycle Picker Dropdown */}
                {showCyclePicker && (
                  <div className="absolute top-full left-1/2 -translate-x-1/2 mt-2 bg-white border rounded-lg shadow-xl z-50 w-32 max-h-48 overflow-y-auto custom-scrollbar flex flex-col p-1 animate-in fade-in zoom-in-95 duration-100" onClick={(e) => e.stopPropagation()}>
                    <div className="text-[10px] text-center font-bold text-gray-400 uppercase py-1 border-b mb-1">Set Today As...</div>
                    {Array.from({ length: cycleLength }, (_, i) => i + 1).map(num => (
                      <button key={num} onClick={() => handleSetCycleDay(num)} className={`text-xs font-bold py-1.5 rounded hover:bg-slate-100 ${num === currentCycleDay ? 'bg-indigo-50 text-indigo-600' : 'text-slate-600'}`}>

                  title={revertConfirmOpen ? "Click to Confirm" : "Revert to Template"}
                >
                  {revertConfirmOpen ? <span className="text-[10px] font-bold px-1 whitespace-nowrap animate-in fade-in">Confirm Reset?</span> : <RotateCcw size={16} />}
                </button>

              <button onClick={addItem} className="p-1.5 text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors shadow-sm" title="Add activity"><Plus size={16} /></button>
              <button onClick={onOpenSettings} className="p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 rounded-lg transition-colors" title="Schedule settings"><Settings size={16} /></button>
            </div>
          </div>

          <div className="flex-1 overflow-y-auto p-2 flex flex-col gap-2 custom-scrollbar bg-slate-50/50">
            {items.length === 0 ? (
              <div className="flex flex-col items-center justify-center h-full text-center p-6 opacity-60">
                <div className="w-16 h-16 bg-slate-200 rounded-full flex items-center justify-center mb-4 text-slate-400"><Calendar size={32} /></div>
                <p className="text-slate-500 text-sm font-medium mb-1">No plans for {displayDayName}</p>
                <p className="text-slate-400 text-xs mb-4">Add an activity just for today, or edit the template in settings.</p>
                <button onClick={addItem} className="px-4 py-2 bg-indigo-600 text-white text-xs font-bold rounded-lg hover:bg-indigo-700 shadow-md transition-transform active:scale-95 flex items-center gap-2"><Plus size={14} /> Add Activity</button>

                    </div>

                    <div className="relative flex items-center justify-center shrink-0">
                      <div className="cursor-pointer hover:scale-110 transition-transform active:scale-95 p-1 rounded-lg hover:bg-indigo-50"
                        style={{ fontSize: emojiSize + 'px' }}
                        onClick={(e) => { e.stopPropagation(); setEmojiPickerIndex(emojiPickerIndex === index ? null : index); }}>
                        {item.emoji || '📚'}
                      </div>
                      {emojiPickerIndex === index && <div className="absolute left-0 top-full mt-2 z-[100] bg-white rounded-xl shadow-2xl border border-slate-100 p-2 w-56 max-h-48 overflow-y-auto custom-scrollbar animate-in fade-in zoom-in-95 duration-100" onClick={(e) => e.stopPropagation()}><div className="grid grid-cols-5 gap-1"> {SCHEDULE_EMOJIS.map((emoji, i) => (<button key={i} onClick={() => selectEmoji(index, emoji)} className={`text-2xl p-2 rounded-lg hover:bg-indigo-50 transition-colors ${item.emoji === emoji ? 'bg-indigo-100' : ''}`}>{emoji}</button>))} </div></div>}
                    </div>

                  </div>
                );

            )}
            {hasOverride && items.length > 0 && <div className="text-center py-2 text-[10px] text-orange-400 font-bold uppercase tracking-widest bg-orange-50/50">Custom Schedule for {viewDate.toLocaleDateString()}</div>}
          </div>

      // Auto-grow logic when content is embedded
      useEffect(() => {
        if (currentUrl && updateLayout && widget.size.height < 500) {
          const targetWidth = 900;
          const targetHeight = 550;
          const targetX = (window.innerWidth - targetWidth) / 2;
          const targetY = 10; // 10px from top as requested
          updateLayout(widget.id, { x: targetX, y: targetY }, { width: targetWidth, height: targetHeight });

      }, [currentUrl, widget.id]);

        if (!link) return null;
        let processedLink = link.trim();
        // Auto-add protocol if missing (and not an iframe tag)
        if (!processedLink.startsWith('http://') && !processedLink.startsWith('https://') && !processedLink.startsWith('<iframe')) {
          processedLink = 'https://' + processedLink;
        }

        if (processedLink.includes("youtube.com") || processedLink.includes("youtu.be")) {
          const id = processedLink.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=|youtube\.com\/embed\/)([\w-]{11})/)?.[1];
          // User requested yout-ube.com for ad-free experience
          return id ? `https://www.yout-ube.com/watch?v=${id}` : null;

        if (processedLink.includes("vimeo.com")) {
          const id = processedLink.match(/vimeo\.com\/(\d+)/)?.[1];

        }
        if (processedLink.includes("<iframe")) {
          const src = processedLink.match(/src="([^"]+)"/)?.[1];
          return src || null;
        }
        return processedLink;
      };

      };

      const handleDrop = (e) => {
        e.preventDefault(); e.stopPropagation();
        setDragActive(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
      };

      const resizeImage = (file, callback) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const MAX_WIDTH = 1024; // Apps optimized
            const MAX_HEIGHT = 1024;
            let width = img.width;
            let height = img.height;
            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } }
            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            callback(canvas.toDataURL('image/jpeg', 0.7)); // Optimized quality
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleFile = useCallback((file) => {
        if (!file.type.startsWith('image/')) return;

        // Check file size (5MB limit)
        const MAX_SIZE_MB = 5;

                                    // Robust CSV split to handle commas inside quotes
                                    const parts = [];
                                    let currentPart = '';
                                    let inQuotes = false;
                                    for (let char of lines[i]) {

                                        parts.push(currentPart.trim().replace(/^"|"$/g, ''));

                                      const matchWeek = day.match(/Week\s*(\d+)/i);

                                          day = `Day ${calcDay}`;
                                          customDayLabels[calcDay] = dayLabel;

      const { width, height } = widget.size;
      const [viewDate, setViewDate] = useState(new Date());
      const isDark = (isGlassy === 'glass' || isGlassy === 'clear') && extraProps.textColor === 'text-white';

      };

      const isSelected = (day) => {
        if (!selectedDate) return false;
        return day === selectedDate.getDate() &&
          viewDate.getMonth() === selectedDate.getMonth() &&
          viewDate.getFullYear() === selectedDate.getFullYear();
      };

      // Auto-scale font based on widget size
      const baseSize = Math.min(width, height);
      const dynamicFontSize = Math.max(10, baseSize / 18); // Tuned for optimal look

      const getDaysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
      const getFirstDayOfMonth = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();

      const changeMonth = (delta) => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() + delta, 1));

      const isToday = (day) => {
        const today = new Date();
        return day === today.getDate() &&
          viewDate.getMonth() === today.getMonth() &&
          viewDate.getFullYear() === today.getFullYear();
      };

      const daysInMonth = getDaysInMonth(viewDate);
      const firstDay = getFirstDayOfMonth(viewDate);
      const days = Array.from({ length: daysInMonth }, (_, i) => i + 1);
      const blanks = Array.from({ length: firstDay }, (_, i) => i);
      const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

              >
                <Grid size={14} /> Grid Glide
              </button>
              <button
                onClick={() => updateData(widget.id, { activeGame: 'scramble' })}
                className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${activeGame === 'scramble' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
              >
                <RefreshCw size={14} /> Scramble
              </button>
            </div>
            <button
              onClick={() => updateData(widget.id, { showSettings: !widget.data.showSettings })}
              className="p-2 text-slate-400 hover:text-blue-600 hover:bg-white rounded-lg transition-all"
            >
              <Settings size={18} />
            </button>
          </div>

          <div className="flex-1 min-h-0 relative">
            {activeGame === 'wordle' && <WordWizard widget={widget} updateData={updateData} />}
            {activeGame === 'boggle' && <GridGlide widget={widget} updateData={updateData} />}
            {activeGame === 'scramble' && <ScrambleSwap widget={widget} updateData={updateData} />}
          </div>
        </div>
      );
    };

    const WordWizard = ({ widget, updateData }) => {
      const { useState, useEffect } = React;
      const [input, setInput] = useState('');
      const [shake, setShake] = useState(false);
      const [message, setMessage] = useState(null);
      const DEFAULT_BANK = { "3": ["CAT"], "4": ["DOGS"], "5": ["APPLE"], "6": ["ORANGE"] };
      const [bank, setBank] = useState(window.WORD_BANKS || DEFAULT_BANK);

      useEffect(() => {
        const fetchBank = async () => {
          if (window.__WORD_BANK_CACHE) {
            setBank(window.__WORD_BANK_CACHE);
            return;
          }
          try {
            const response = await fetch('js/constants/word-banks.json');
            const data = await response.json();
            window.__WORD_BANK_CACHE = data;
            setBank(data);
          } catch (e) {
            console.error('Failed to load word bank:', e);
          }
        };
        fetchBank();
      }, []);

      const wordLength = widget.data.wordleSize || 5;
      const guesses = widget.data.wordleGuesses || [];
      const target = widget.data.wordleTarget || 'APPLE';
      const isGameOver = widget.data.wordleStatus === 'won' || guesses.length >= 6;

      const resetGame = (isNewWord = true) => {
        if (isNewWord) {
          const words = bank[wordLength] || bank[5] || ["APPLE"];
          const newTarget = words[Math.floor(Math.random() * words.length)];
          updateData(widget.id, {
            wordleTarget: newTarget,
            wordleGuesses: [],
            wordleStatus: 'playing'
          });
        } else {
          updateData(widget.id, {
            wordleGuesses: [],
            wordleStatus: 'playing'
          });
        }
        setInput('');
        setMessage(null);
      };

      const handleKey = (key) => {
        if (isGameOver && key !== 'Enter') return;
        if (key === 'Enter') {
          if (isGameOver) {
            resetGame(true);
            return;
          }
            if (input.length === wordLength) {
              const uppercaseInput = input.toUpperCase();
              let isValidWord = false;
              console.log('WordWizard: Validating', uppercaseInput, 'against bank of size', Object.keys(bank).length);
              for (const len in bank) {
                if (Array.isArray(bank[len]) && bank[len].includes(uppercaseInput)) {
                  isValidWord = true;
                  break;
                }
              }
              console.log('WordWizard: isValidWord =', isValidWord);

            if (!isValidWord) {
              setShake(true);
              setMessage('Not in word bank');
              setTimeout(() => {
                setShake(false);
                setMessage(null);
              }, 1500);
              return;
            }

            const newGuesses = [...guesses, uppercaseInput];
            let status = 'playing';
            if (uppercaseInput === target) status = 'won';
            else if (newGuesses.length >= 6) status = 'lost';
            updateData(widget.id, { wordleGuesses: newGuesses, wordleStatus: status });
            setInput('');
          } else {
            setShake(true);
            setTimeout(() => setShake(false), 500);
          }
        } else if (key === 'Backspace') {
          setInput(prev => prev.slice(0, -1));
        } else if (/^[a-zA-Z]$/.test(key) && input.length < wordLength) {
          setInput(prev => prev + key.toUpperCase());
        }
      };

      useEffect(() => {
        if (!widget.data.wordleTarget || (widget.data.wordleTarget === 'APPLE' && bank !== DEFAULT_BANK)) {
          resetGame();
        }
      }, [widget.data.wordleTarget, wordLength, bank]);

      const getCharClass = (char, index, guess) => {
        if (target[index] === char) return 'bg-green-500 text-white border-green-600 scale-105';
        if (target.includes(char)) return 'bg-yellow-500 text-white border-yellow-600';
        return 'bg-slate-400 text-white border-slate-500 opacity-80';
      };

      return (
        <div className="p-3 h-full flex flex-col items-center justify-center gap-3 bg-slate-100/50 overflow-y-auto custom-scrollbar">
          <div className="flex gap-2">
            <button
              onClick={() => resetGame(false)}
              className="flex items-center gap-2 px-3 py-1.5 bg-white text-slate-600 rounded-xl text-[10px] font-black uppercase hover:bg-slate-50 border-b-2 border-slate-200 transition-all active:translate-y-px active:border-b-0"
              title="Clear all guesses"
            >
              <RotateCcw size={12} /> Restart
            </button>
            <button
              onClick={() => resetGame(true)}
              className="flex items-center gap-2 px-3 py-1.5 bg-white text-blue-600 rounded-xl text-[10px] font-black uppercase hover:bg-slate-50 border-b-2 border-slate-200 transition-all active:translate-y-px active:border-b-0"
              title="New random word"
            >
              <RefreshCw size={12} /> New Word
            </button>
          </div>
          <div className={`grid gap-1.5 mb-2 relative ${shake ? 'animate-shake' : ''}`}>
            {[...Array(6)].map((_, i) => (
              <div key={i} className="flex gap-2">
                {[...Array(wordLength)].map((_, j) => {
                  const guess = guesses[i];
                  const char = guess ? guess[j] : (i === guesses.length ? input[j] : '');
                  const statusClass = guess ? getCharClass(char, j, guess) : (char ? 'border-slate-400 border-2 scale-105' : 'border-slate-200');
                  return (
                    <div key={j} className={`w-12 h-12 flex items-center justify-center text-xl font-black rounded-xl border-b-4 transition-all duration-500 shadow-sm ${statusClass} ${!guess && !char ? 'bg-white' : ''}`}>
                      {char}
                    </div>
                  );
                })}
              </div>
            ))}
            {message && (
              <div className="absolute inset-x-0 -bottom-8 flex justify-center z-10 animate-in fade-in zoom-in slide-in-from-top-2">
                <span className="bg-slate-800 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-lg uppercase tracking-wider">{message}</span>
              </div>
            )}
          </div>

          <div className="w-full max-w-[280px] flex gap-2">
            <input
              type="text"
              maxLength={wordLength}
              value={input}
              onChange={e => setInput(e.target.value.toUpperCase().replace(/[^A-Z]/g, ''))}
              onKeyDown={e => e.key === 'Enter' && handleKey('Enter')}
              className="flex-1 p-2 rounded-xl border-2 border-slate-200 text-center font-black text-xl tracking-widest uppercase focus:border-blue-500 outline-none shadow-sm"
              placeholder="TYPE GUESS"
              disabled={isGameOver}
            />
            <button onClick={() => handleKey('Enter')} disabled={isGameOver || input.length !== wordLength} className="px-4 py-2 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 disabled:opacity-50 shadow-md transition-all active:scale-95">Enter</button>
          </div>

          {isGameOver && (
            <div className="text-center animate-in fade-in zoom-in slide-in-from-bottom-4 mt-2">
              <div className={`text-lg font-black mb-4 ${widget.data.wordleStatus === 'won' ? 'text-green-600' : 'text-red-500'}`}>
                {widget.data.wordleStatus === 'won' ? 'PERFECT! 🎉' : `Word was: ${target}`}
              </div>
              <button onClick={resetGame} className="px-6 py-2 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all active:scale-95">Play Again</button>
            </div>
          )}

          {widget.data.showSettings && (
            <div className="absolute inset-0 bg-white/95 backdrop-blur-md z-30 p-6 flex flex-col gap-4 animate-in fade-in slide-in-from-right-4">
              <div className="flex justify-between items-center">
                <h3 className="font-black text-slate-800 uppercase tracking-tight">Game Settings</h3>
                <button onClick={() => updateData(widget.id, { showSettings: false })} className="p-2 hover:bg-slate-100 rounded-full"><X size={20} /></button>
              </div>
              <div className="space-y-4">
                <div>
                  <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block">Word Length</label>
                  <div className="flex gap-2">
                    {[3, 4, 5, 6].map(s => (
                      <button key={s} onClick={() => { updateData(widget.id, { wordleSize: s }); resetGame(); }} className={`flex-1 py-3 rounded-xl font-bold border-2 transition-all ${wordLength === s ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-400 border-slate-100 hover:border-blue-200'}`}>{s}</button>
                    ))}
                  </div>
                </div>
                <div>
                  <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block">Custom Word (Teacher)</label>
                  <input
                    type="text"
                    placeholder="Enter word..."
                    className="w-full p-3 rounded-xl border-2 border-slate-100 focus:border-blue-500 outline-none uppercase font-bold"
                    onKeyDown={(e) => {
                      if (e.key === 'Enter') {
                        const val = e.currentTarget.value.toUpperCase();
                        if (val.length >= 3 && val.length <= 6) {
                          updateData(widget.id, { wordleTarget: val, wordleGuesses: [], wordleStatus: 'playing', wordleSize: val.length, showSettings: false });
                        }
                      }
                    }}
                  />
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const GridGlide = ({ widget, updateData }) => {
      const { useState, useEffect } = React;
      const gridSize = widget.data.boggleSize || 4;
      const grid = widget.data.boggleGrid || [];
      const foundWords = widget.data.boggleFound || [];
      const [selection, setSelection] = useState([]);
      const [isSelecting, setIsSelecting] = useState(false);
      const [message, setMessage] = useState(null);
      const DEFAULT_BANK = { "3": ["CAT"], "4": ["DOGS"], "5": ["APPLE"], "6": ["ORANGE"] };
      const [bank, setBank] = useState(window.WORD_BANKS || DEFAULT_BANK);

      useEffect(() => {
        const fetchBank = async () => {
          if (window.__WORD_BANK_CACHE) {
            setBank(window.__WORD_BANK_CACHE);
            return;
          }
          try {
            const response = await fetch('js/constants/word-banks.json');
            const data = await response.json();
            window.__WORD_BANK_CACHE = data;
            setBank(data);
          } catch (e) {
            console.error('Failed to load word bank:', e);
          }
        };
        fetchBank();
      }, []);

      const generateGrid = () => {
        // Frequency-based distribution for more playable boards (Scrabble-like)
        const distribution = 'AAAAAAAAABBCCDDDDEEEEEEEEEEEEFFGGGHHIIIIIIIIIJKLLLLMMNNNNNNOOOOOOOOPPQRRRRRRSSSSTTTTTTUUUUVVWWXYYZ';
        const newGrid = [];
        for (let i = 0; i < gridSize * gridSize; i++) {
          newGrid.push(distribution[Math.floor(Math.random() * distribution.length)]);
        }
        updateData(widget.id, { boggleGrid: newGrid, boggleFound: [] });
        setSelection([]);
      };

      useEffect(() => {
        if (!widget.data.boggleGrid) generateGrid();
      }, [gridSize]);

      const handlePointerDown = (idx) => {
        setIsSelecting(true);
        setSelection([idx]);
      };

      const handlePointerEnter = (idx) => {
        if (!isSelecting || selection.includes(idx)) return;
        const lastIdx = selection[selection.length - 1];
        const lastRow = Math.floor(lastIdx / gridSize);
        const lastCol = lastIdx % gridSize;
        const currRow = Math.floor(idx / gridSize);
        const currCol = idx % gridSize;

        if (Math.abs(lastRow - currRow) <= 1 && Math.abs(lastCol - currCol) <= 1) {
          setSelection([...selection, idx]);
        }
      };

      const handlePointerUp = () => {
        if (!isSelecting) return;
        setIsSelecting(false);
        const word = selection.map(idx => grid[idx]).join('');

        let isValidWord = false;
        for (const len in bank) {
          if (bank[len].includes(word)) {
            isValidWord = true;
            break;
          }
        }

        if (word.length < 3) {
          setSelection([]);
          return;
        }

        if (isValidWord && !foundWords.includes(word)) {
          updateData(widget.id, { boggleFound: [...foundWords, word] });
          setMessage({ text: 'Valid!', color: 'text-green-500' });
        } else if (foundWords.includes(word)) {
          setMessage({ text: 'Already found', color: 'text-yellow-500' });
        } else {
          setMessage({ text: 'Not in word bank', color: 'text-slate-400' });
        }
        setTimeout(() => { setMessage(null); setSelection([]); }, 1000);
      };

      return (
        <div className="p-4 h-full flex flex-col items-center gap-4 bg-slate-100/50 overflow-y-auto" onPointerUp={handlePointerUp}>
          <div className="flex gap-2">
            <button
              onClick={() => updateData(widget.id, { boggleFound: [] })}
              className="flex items-center gap-2 px-3 py-1.5 bg-white text-slate-600 rounded-xl text-[10px] font-black uppercase hover:bg-slate-50 border-b-2 border-slate-200 transition-all active:translate-y-px active:border-b-0"
              title="Clear found words"
            >
              <RotateCcw size={12} /> Restart
            </button>
            <button
              onClick={generateGrid}
              className="flex items-center gap-2 px-3 py-1.5 bg-white text-blue-600 rounded-xl text-[10px] font-black uppercase hover:bg-slate-50 border-b-2 border-slate-200 transition-all active:translate-y-px active:border-b-0"
              title="New random board"
            >
              <RefreshCw size={12} /> New Board
            </button>
          </div>
          <div className="flex justify-between w-full max-w-[280px] mb-2">
            <div className="text-[10px] font-black uppercase text-slate-400">Words: {foundWords.length}</div>
            {message && <div className={`text-[10px] font-black uppercase ${message.color} animate-pulse`}>{message.text}</div>}
          </div>

          <div
            className="grid gap-2 select-none touch-none"
            style={{ gridTemplateColumns: `repeat(${gridSize}, 1fr)` }}
          >
            {grid.map((char, i) => (
              <div
                key={i}
                onPointerDown={() => handlePointerDown(i)}
                onPointerEnter={() => handlePointerEnter(i)}
                className={`w-14 h-14 flex items-center justify-center text-2xl font-black rounded-2xl border-b-4 transition-all duration-100 cursor-pointer shadow-md ${selection.includes(i) ? 'bg-blue-600 text-white border-blue-800 scale-95 shadow-inner' : 'bg-white text-slate-700 border-slate-200 hover:border-slate-300'}`}
              >
                {char}
              </div>
            ))}
          </div>

          <div className="w-full max-w-[320px] bg-white/50 backdrop-blur rounded-xl p-3 flex flex-wrap gap-2 mt-2">
            {foundWords.length === 0 && <div className="text-[10px] italic text-slate-400 w-full text-center py-2">Swipe letters to find words!</div>}
            {foundWords.map((w, i) => (
              <span key={i} className="px-2 py-1 bg-green-100 text-green-700 rounded-lg text-[10px] font-bold border border-green-200">
                {w}
              </span>
            ))}
          </div>

          {widget.data.showSettings && (
            <div className="absolute inset-0 bg-white/95 backdrop-blur-md z-30 p-6 flex flex-col gap-4 animate-in fade-in slide-in-from-right-4">
              <div className="flex justify-between items-center">
                <h3 className="font-black text-slate-800 uppercase tracking-tight">Game Settings</h3>
                <button onClick={() => updateData(widget.id, { showSettings: false })} className="p-2 hover:bg-slate-100 rounded-full"><X size={20} /></button>
              </div>
              <div className="space-y-4">
                <div>
                  <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block">Grid Size</label>
                  <div className="flex gap-2">
                    {[4, 5].map(s => (
                      <button key={s} onClick={() => { updateData(widget.id, { boggleSize: s }); generateGrid(); }} className={`flex-1 py-3 rounded-xl font-bold border-2 transition-all ${gridSize === s ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-400 border-slate-100 hover:border-blue-200'}`}>{s}x{s}</button>
                    ))}
                  </div>
                </div>
                <button onClick={generateGrid} className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-slate-900 transition-all">
                  <RefreshCw size={16} /> New Board
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    const ScrambleSwap = ({ widget, updateData }) => {
      const { useState, useEffect } = React;
      const wordLength = widget.data.scrambleSize || 5;
      const target = widget.data.scrambleTarget || 'APPLE';
      const current = widget.data.scrambleCurrent || [];
      const isSolved = widget.data.scrambleSolved || false;
      const hintedIndices = widget.data.scrambleHints || [];
      const [selectedIndex, setSelectedIndex] = useState(null);
      const [shake, setShake] = useState(false);
      const [bank, setBank] = useState({ "3": ["CAT"], "4": ["DOGS"], "5": ["APPLE"], "6": ["ORANGE"] });

      useEffect(() => {
        const fetchBank = async () => {
          if (window.__WORD_BANK_CACHE) {
            setBank(window.__WORD_BANK_CACHE);
            return;
          }
          try {
            const response = await fetch('js/constants/word-banks.json');
            const data = await response.json();
            window.__WORD_BANK_CACHE = data;
            setBank(data);
          } catch (e) {
            console.error('Failed to load word bank:', e);
          }
        };
        fetchBank();
      }, []);

      const scrambleWord = (word) => {
        const arr = word.split('');
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        if (arr.join('') === word && word.length > 1) {
          for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
          }
        }
        return arr;
      };

      const resetGame = (isNewWord = true) => {
        const words = bank[wordLength] || bank[5] || ["APPLE"];

        if (isNewWord) {
          const newTarget = words[Math.floor(Math.random() * words.length)];
          updateData(widget.id, {
            scrambleTarget: newTarget,
            scrambleCurrent: scrambleWord(newTarget),
            scrambleSolved: false,
            scrambleHints: []
          });
        } else {
          updateData(widget.id, {
            scrambleCurrent: scrambleWord(target),
            scrambleSolved: false,
            scrambleHints: []
          });
        }
        setSelectedIndex(null);
        setShake(false);
      };

      const giveHint = () => {
        if (isSolved) return;
        const incorrectIndices = [];
        for (let i = 0; i < target.length; i++) {
          if (current[i] !== target[i]) {
            incorrectIndices.push(i);
          }
        }
        if (incorrectIndices.length === 0) return;

        const targetIndex = incorrectIndices[Math.floor(Math.random() * incorrectIndices.length)];
        const targetChar = target[targetIndex];

        let currentIndex = -1;
        for (let i = 0; i < current.length; i++) {
          if (i !== targetIndex && current[i] === targetChar && current[i] !== target[i]) {
            currentIndex = i;
            break;
          }
        }

        if (currentIndex !== -1) {
          const next = [...current];
          [next[targetIndex], next[currentIndex]] = [next[currentIndex], next[targetIndex]];
          updateData(widget.id, {
            scrambleCurrent: next,
            scrambleSolved: next.join('') === target,
            scrambleHints: [...hintedIndices, targetIndex]
          });
          setSelectedIndex(null);
        }
      };

      useEffect(() => {
        if (!widget.data.scrambleTarget || !widget.data.scrambleCurrent || widget.data.scrambleCurrent.length === 0 || (widget.data.scrambleTarget === 'APPLE' && Object.keys(bank).length > 4)) {
          resetGame();
        }
      }, [wordLength, widget.data.scrambleTarget, widget.data.scrambleCurrent, bank]);

      const swap = (i, j) => {
        const next = [...current];
        [next[i], next[j]] = [next[j], next[i]];
        updateData(widget.id, { scrambleCurrent: next, scrambleSolved: false });
        setSelectedIndex(null);
      };

      const checkWord = () => {
        const word = current.join('');
        const lenBank = bank[wordLength] || [];
        if (word === target || lenBank.includes(word)) {
          updateData(widget.id, { scrambleSolved: true });
        } else {
          setShake(true);
          setTimeout(() => setShake(false), 500);
        }
      };

      return (
        <div className="p-8 h-full flex flex-col items-center justify-center gap-8 bg-slate-100/50 relative overflow-hidden">
          <div className="flex gap-2 mb-2">
            <button
              onClick={() => resetGame(false)}
              className="flex items-center gap-2 px-3 py-1.5 bg-white text-slate-600 rounded-xl text-[10px] font-black uppercase hover:bg-slate-50 border-b-2 border-slate-200 transition-all active:translate-y-px active:border-b-0"
              title="Rescramble current word"
            >
              <RotateCcw size={12} /> Restart
            </button>
            <button
              onClick={() => resetGame(true)}
              className="flex items-center gap-2 px-3 py-1.5 bg-white text-blue-600 rounded-xl text-[10px] font-black uppercase hover:bg-slate-50 border-b-2 border-slate-200 transition-all active:translate-y-px active:border-b-0"
              title="New random word"
            >
              <RefreshCw size={12} /> New Word
            </button>
          </div>
          <div className={`flex gap-2 flex-wrap justify-center ${shake ? 'animate-shake' : ''}`}>
            {current.map((char, i) => (
              <button
                key={i}
                onClick={() => {
                  if (isSolved) return;
                  if (selectedIndex === null) setSelectedIndex(i);
                  else if (selectedIndex === i) setSelectedIndex(null);
                  else swap(selectedIndex, i);
                }}
                className={`w-14 h-14 flex items-center justify-center text-2xl font-black rounded-2xl border-b-4 transition-all duration-300 shadow-lg ${isSolved ? 'bg-green-500 text-white border-green-600 scale-110' : (hintedIndices.includes(i) && current[i] === target[i] ? 'bg-amber-100 text-amber-700 border-amber-300' : (selectedIndex === i ? 'bg-blue-600 text-white border-blue-800 -translate-y-2' : 'bg-white text-slate-700 border-slate-200 hover:border-slate-300'))}`}
              >
                {char}
              </button>
            ))}
          </div>

          {!isSolved ? (
            <div className="flex gap-4">
              <button onClick={giveHint} className="px-5 py-3 bg-amber-100 text-amber-700 hover:bg-amber-200 rounded-xl font-bold border-2 border-amber-200 transition-all active:scale-95 flex items-center gap-2" title="Reveal one letter">
                <Lightbulb size={20} /> Hint
              </button>
              <button onClick={checkWord} className="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-xl shadow-blue-200 transition-all active:scale-95 uppercase tracking-wider">Check Word</button>
            </div>
          ) : (
            <div className="text-center animate-in fade-in zoom-in slide-in-from-bottom-4">
              <div className="text-green-600 text-lg font-black mb-4 uppercase tracking-[0.2em]">Unscrambled! 🏆</div>
              <button onClick={resetGame} className="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-xl shadow-blue-200 transition-all active:scale-95">Next Word</button>
            </div>
          )}

          {widget.data.showSettings && (
            <div className="absolute inset-0 bg-white/95 backdrop-blur-md z-30 p-6 flex flex-col gap-4 animate-in fade-in slide-in-from-right-4">
              <div className="flex justify-between items-center">
                <h3 className="font-black text-slate-800 uppercase tracking-tight">Game Settings</h3>
                <button onClick={() => updateData(widget.id, { showSettings: false })} className="p-2 hover:bg-slate-100 rounded-full"><X size={20} /></button>
              </div>
              <div className="space-y-4">
                <div>
                  <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block">Word Length</label>
                  <div className="flex gap-2">
                    {[3, 4, 5, 6].map(s => (
                      <button key={s} onClick={() => { updateData(widget.id, { scrambleSize: s }); resetGame(); }} className={`flex-1 py-3 rounded-xl font-bold border-2 transition-all ${wordLength === s ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-400 border-slate-100 hover:border-blue-200'}`}>{s}</button>
                    ))}
                  </div>
                </div>
                <button onClick={resetGame} className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-slate-900 transition-all">
                  <RefreshCw size={16} /> New Word
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };




    const Shape = ({ type, color, scale = 1, rotation = 0 }) => {
      const styles = {
        transform: `scale(${scale}) rotate(${rotation}deg)`,
        transformOrigin: 'center',
        color: color,
        fill: 'currentColor'
      };

      if (type === 'square') return <div style={{ ...styles, width: '60px', height: '60px', backgroundColor: color }} />;
      if (type === 'circle') return <div style={{ ...styles, width: '60px', height: '60px', backgroundColor: color, borderRadius: '999px' }} />;
      if (type === 'triangle') return <Triangle size={60} style={styles} />;
      if (type === 'hexagon') return <Hexagon size={60} style={styles} />;
      if (type === 'arrow') return <ArrowRight size={60} style={styles} />;
      if (type === 'semicircle') return <div style={{ ...styles, width: '60px', height: '30px', backgroundColor: color, borderRadius: '60px 60px 0 0' }} />;
      return null;
    };

    const Line = ({ color, length, rotation }) => {
      return (
        <div style={{
          width: `${length}px`,
          height: '2px',
          backgroundColor: color,
          transform: `rotate(${rotation}deg)`,
          transformOrigin: 'left center'
        }} />
      );
    };

    const DrawingWidget = ({ widget, updateData }) => {
      const { useState, useEffect, useRef } = React;
      const {
        color = '#000000',
        brushSize = 8,
        tool = 'pen',
        textItems = [],
        emojiItems = [],
        imageItems = [],
        shapeItems = [],
        lineItems = [],
        drawOffset = { x: 0, y: 0 },
        bgType = 'none',
        canvasData
      } = widget.data;

      const canvasRef = useRef(null);
      const ctxRef = useRef(null);
      const isDrawing = useRef(false);
      const lastPoint = useRef(null);
      const lastTime = useRef(null);
      const [showColorPicker, setShowColorPicker] = useState(false);
      const [showEmojiPicker, setShowEmojiPicker] = useState(false);
      const [showShapePicker, setShowShapePicker] = useState(false);
      const [showBgPicker, setShowBgPicker] = useState(false);
      const [selectedItem, setSelectedItem] = useState(null);
      const [history, setHistory] = useState([]);
      const [historyIndex, setHistoryIndex] = useState(-1);
      const [previewLine, setPreviewLine] = useState(null);
      const resizeTimeout = useRef(null);

      const DRAWING_EMOJIS = ['⭐', '❤️', '✅', '❌', '👍', '👎', '🎯', '🏆', '🔥', '💡', '📌', '🎨', '📄', '🌟', '✨', '🎉', '💯', '👀', '🤔', '💪', '🌈', '⚡', '🎁', '😊', '🙌', '🎵', '🌸', '🍎', '🚀', '💎', '🎨', '🖌️', '🖍️', '📝', '📏', '📐', '🧠', '💡', '🧪', '🔬', '🔭', '🌍', '☀️', '🌙', '⭐', '🌈', '🌊', '🔥', '💨', '🌱', '🌳', '🍂', '🍄', '🐾', '🦋', '🐝', '🐞', '🐠', '🐦', '🦉', '😀', '😃', '😄', '😁', '😆', '😅', '😂', '🤣', '😊', '😇', '🙂', '🙃', '😉', '😌', '😍', '🥰', '😘', '😗', '😙', '😚', '😋', '😛', '😝', '😜', '🤪', '🤨', '🧐', '🤓', '😎', '🥸', '🤩', '🥳', '😏', '😒', '😞', '😔', '😟', '😕', '🙁', '☹️', '😣', '😖', '😫', '😩', '🥺', '😢', '😭', '😮‍💨', '😤', '😠', '😡'];

      const BG_TEMPLATES = [
        { id: 'none', label: 'None', icon: 'None' },
        { id: 'grid', label: 'Grid', style: { backgroundImage: 'linear-gradient(to right, #f1f5f9 1px, transparent 1px), linear-gradient(to bottom, #f1f5f9 1px, transparent 1px)', backgroundSize: '30px 30px' } },
        { id: 'dots', label: 'Dots', style: { backgroundImage: 'radial-gradient(#e2e8f0 1.5px, transparent 1.5px)', backgroundSize: '30px 30px' } },
        { id: 'lines', label: 'Lines', style: { backgroundImage: 'linear-gradient(#f1f5f9 1.5px, transparent 1.5px)', backgroundSize: '100% 30px' } },
        { id: 'dark-grid', label: 'Blueprint', style: { backgroundColor: '#1e293b', backgroundImage: 'linear-gradient(to right, #334155 1px, transparent 1px), linear-gradient(to bottom, #334155 1px, transparent 1px)', backgroundSize: '30px 30px' } }
      ];

      const saveToHistory = () => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const imageData = canvas.toDataURL();
        setHistory(prev => [...prev.slice(0, historyIndex + 1), imageData]);
        setHistoryIndex(prev => prev + 1);
        updateData(widget.id, { canvasData: imageData });
      };

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.parentElement.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = `${rect.width}px`;
        canvas.style.height = `${rect.height}px`;
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);

        if (bgType === 'none' || !BG_TEMPLATES.find(t => t.id === bgType)?.style?.backgroundColor) {
          ctx.clearRect(0, 0, rect.width, rect.height);
        }

        if (canvasData) {
          const img = new Image();
          img.onload = () => {
            ctx.drawImage(img, 0, 0, img.width / dpr, img.height / dpr);
            if (history.length === 0) {
              setHistory([canvasData]);
              setHistoryIndex(0);
            }
          };
          img.src = canvasData;
        } else if (history.length === 0) {
          saveToHistory();
        }

        ctxRef.current = ctx;
      }, [bgType]);

      const lastDimensions = useRef({ width: 0, height: 0 });
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const handleResize = () => {
          clearTimeout(resizeTimeout.current);
          resizeTimeout.current = setTimeout(() => {
            const rect = canvas.parentElement.getBoundingClientRect();
            if (Math.abs(rect.width - lastDimensions.current.width) < 5 &&
              Math.abs(rect.height - lastDimensions.current.height) < 5) {
              return;
            }
            lastDimensions.current = { width: rect.width, height: rect.height };
            const imageData = canvas.toDataURL();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = `${rect.width}px`;
            canvas.style.height = `${rect.height}px`;
            const img = new Image();
            img.onload = () => {
              ctxRef.current.scale(dpr, dpr);
              ctxRef.current.clearRect(0, 0, rect.width, rect.height);
              ctxRef.current.drawImage(img, 0, 0, img.width / dpr, img.height / dpr);
            };
            img.src = imageData;
          }, 50);
        };
        const observer = new ResizeObserver(handleResize);
        observer.observe(canvas.parentElement);
        return () => { observer.disconnect(); clearTimeout(resizeTimeout.current); };
      }, []);

      const undo = () => {
        if (historyIndex <= 0) return;
        const newIndex = historyIndex - 1;
        setHistoryIndex(newIndex);
        const img = new Image();
        img.onload = () => {
          const rect = canvasRef.current.parentElement.getBoundingClientRect();
          const dpr = window.devicePixelRatio || 1;
          ctxRef.current.clearRect(0, 0, rect.width, rect.height);
          ctxRef.current.drawImage(img, 0, 0, img.width / dpr, img.height / dpr);
        };
        img.src = history[newIndex];
      };

      const redo = () => {
        if (historyIndex >= history.length - 1) return;
        const newIndex = historyIndex + 1;
        setHistoryIndex(newIndex);
        const img = new Image();
        img.onload = () => {
          const rect = canvasRef.current.parentElement.getBoundingClientRect();
          const dpr = window.devicePixelRatio || 1;
          ctxRef.current.clearRect(0, 0, rect.width, rect.height);
          ctxRef.current.drawImage(img, 0, 0, img.width / dpr, img.height / dpr);
        };
        img.src = history[newIndex];
      };

      const getPos = (e) => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
        const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
        return { x, y, time: performance.now() };
      };

      const points = useRef([]);
      const smoothedVelocity = useRef(0);
      const currentWidth = useRef(null);

      const startDrawing = (e) => {
        if (tool !== 'pen' && tool !== 'eraser' && tool !== 'line') return;
        isDrawing.current = true;
        const pos = getPos(e);
        lastPoint.current = pos;
        lastTime.current = pos.time;

        if (tool === 'line') {
          setPreviewLine({ x1: pos.x, y1: pos.y, x2: pos.x, y2: pos.y });
        } else {
          points.current = [pos];
          smoothedVelocity.current = 0;
          currentWidth.current = brushSize;

          const ctx = ctxRef.current;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.lineWidth = brushSize;

          if (tool === 'eraser') {
            ctx.globalCompositeOperation = 'destination-out';
          } else {
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = color;
          }

          ctx.beginPath();
          ctx.moveTo(pos.x, pos.y);
          ctx.lineTo(pos.x + 0.1, pos.y + 0.1);
          ctx.stroke();
        }

        window.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);
        window.addEventListener('touchmove', draw, { passive: false });
        window.addEventListener('touchend', stopDrawing);
      };

      const draw = (e) => {
        if (!isDrawing.current || !lastPoint.current) return;
        if (e.type === 'touchmove') e.preventDefault();
        const pos = getPos(e);

        if (tool === 'line') {
          setPreviewLine(prev => ({ ...prev, x2: pos.x, y2: pos.y }));
          return;
        }

        const ctx = ctxRef.current;
        const dx = pos.x - lastPoint.current.x;
        const dy = pos.y - lastPoint.current.y;
        const dt = Math.max(pos.time - lastTime.current, 1);
        const distance = Math.sqrt(dx * dx + dy * dy);
        const velocity = distance / dt;

        smoothedVelocity.current = smoothedVelocity.current * 0.6 + velocity * 0.4;
        const speedFactor = tool === 'eraser' ? 3 : Math.max(0.5, Math.min(1.8, 1.6 - smoothedVelocity.current * 0.1));
        const targetWidth = brushSize * speedFactor;

        const prevWidth = currentWidth.current || brushSize;
        currentWidth.current = prevWidth * 0.7 + targetWidth * 0.3;

        if (tool !== 'eraser') {
          ctx.fillStyle = color;
        }
        const steps = Math.max(1, Math.ceil(distance / 2));
        for (let i = 0; i <= steps; i++) {
          const t = i / steps;
          const x = lastPoint.current.x + dx * t;
          const y = lastPoint.current.y + dy * t;
          const w = prevWidth + (currentWidth.current - prevWidth) * t;

          ctx.beginPath();
          ctx.arc(x, y, w / 2, 0, Math.PI * 2);
          ctx.fill();
        }

        lastPoint.current = pos;
        lastTime.current = pos.time;
      };

      const stopDrawing = () => {
        if (isDrawing.current) {
          isDrawing.current = false;
          if (tool === 'line' && previewLine) {
            const dx = previewLine.x2 - previewLine.x1;
            const dy = previewLine.y2 - previewLine.y1;
            const length = Math.sqrt(dx * dx + dy * dy);
            if (length > 2) {
              const rotation = Math.atan2(dy, dx) * (180 / Math.PI);
              const newLine = { id: Date.now().toString(), x: previewLine.x1, y: previewLine.y1, length, rotation, color };
              updateData(widget.id, { lineItems: [...lineItems, newLine], tool: 'select' });
              setSelectedItem({ type: 'line', id: newLine.id });
            }
            setPreviewLine(null);
          } else if (ctxRef.current) {
            ctxRef.current.closePath();
            saveToHistory();
          }
        }
        window.removeEventListener('mousemove', draw);
        window.removeEventListener('mouseup', stopDrawing);
        window.removeEventListener('touchmove', draw);
        window.removeEventListener('touchend', stopDrawing);
      };

      const handleCanvasClick = (e) => {
        if (tool === 'text') {
          const pos = getPos(e);
          const newText = { id: Date.now().toString(), x: pos.x, y: pos.y, text: 'Text', scale: 1, rotation: 0, color };
          updateData(widget.id, { textItems: [...textItems, newText], tool: 'select' });
          setSelectedItem({ type: 'text', id: newText.id });
        }
      };

      const addEmoji = (emoji) => {
        const canvas = canvasRef.current;
        const newEmoji = { id: Date.now().toString(), x: canvas.width / (2 * (window.devicePixelRatio || 1)), y: canvas.height / (2 * (window.devicePixelRatio || 1)), emoji, scale: 1, rotation: 0 };
        updateData(widget.id, { emojiItems: [...emojiItems, newEmoji], tool: 'select' });
        setShowEmojiPicker(false);
        setSelectedItem({ type: 'emoji', id: newEmoji.id });
      };

      const updateTextContent = (id, text) => {
        updateData(widget.id, { textItems: textItems.map(t => t.id === id ? { ...t, text } : t) });
      };

      const deleteSelected = () => {
        if (!selectedItem) return;
        if (selectedItem.type === 'text') {
          updateData(widget.id, { textItems: textItems.filter(t => t.id !== selectedItem.id) });
        } else if (selectedItem.type === 'emoji') {
          updateData(widget.id, { emojiItems: emojiItems.filter(e => e.id !== selectedItem.id) });
        } else if (selectedItem.type === 'image') {
          updateData(widget.id, { imageItems: imageItems.filter(img => img.id !== selectedItem.id) });
        } else if (selectedItem.type === 'shape') {
          updateData(widget.id, { shapeItems: shapeItems.filter(s => s.id !== selectedItem.id) });
        } else if (selectedItem.type === 'line') {
          updateData(widget.id, { lineItems: lineItems.filter(l => l.id !== selectedItem.id) });
        }
        setSelectedItem(null);
      };

      const addShape = (shapeType) => {
        const newShape = { id: Date.now().toString(), x: 150, y: 150, shapeType, color, scale: 1, rotation: 0 };
        updateData(widget.id, { shapeItems: [...shapeItems, newShape], tool: 'select' });
        setShowShapePicker(false);
        setSelectedItem({ type: 'shape', id: newShape.id });
      };

      const clearCanvas = () => {
        if (!window.confirm('Clear the entire canvas?')) return;
        const ctx = ctxRef.current;
        ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
        updateData(widget.id, { textItems: [], emojiItems: [], shapeItems: [], imageItems: [] });
        setSelectedItem(null);
        saveToHistory();
      };

      const downloadPNG = () => {
        const canvas = canvasRef.current;
        const link = document.createElement('a');
        link.download = 'drawing.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      };

      const handleItemMouseDown = (e, type, id, mode = 'move') => {
        if (tool !== 'select' && type !== 'drawing') return;
        e.stopPropagation();
        e.preventDefault();
        setSelectedItem({ type, id });

        let item;
        if (type === 'text') item = textItems.find(i => i.id === id);
        else if (type === 'emoji') item = emojiItems.find(i => i.id === id);
        else if (type === 'image') item = imageItems.find(i => i.id === id);
        else if (type === 'shape') item = shapeItems.find(i => i.id === id);
        else if (type === 'line') item = lineItems.find(i => i.id === id);
        else if (type === 'drawing') item = { x: drawOffset.x, y: drawOffset.y, scale: 1, rotation: 0 };

        if (!item) return;

        const startX = e.clientX;
        const startY = e.clientY;
        const startItemX = item.x;
        const startItemY = item.y;
        const startScale = item.scale || 1;
        const startRotation = item.rotation || 0;

        const onMove = (me) => {
          const dx = me.clientX - startX;
          const dy = me.clientY - startY;

          if (mode === 'move') {
            if (type === 'drawing') {
              updateData(widget.id, { drawOffset: { x: startItemX + dx, y: startItemY + dy } });
            } else {
              const listKey = type + 'Items';
              const list = type === 'text' ? textItems : (type === 'emoji' ? emojiItems : (type === 'image' ? imageItems : (type === 'shape' ? shapeItems : lineItems)));
              updateData(widget.id, { [listKey]: list.map(i => i.id === id ? { ...i, x: startItemX + dx, y: startItemY + dy } : i) });
            }
          } else if (mode === 'scale' && type !== 'drawing') {
            const dist = Math.sqrt(dx * dx + dy * dy);
            const factor = 1 + (dx > 0 ? dist / 200 : -dist / 200);
            const newScale = Math.max(0.1, Math.min(10, startScale * factor));
            const listKey = type + 'Items';
            const list = type === 'text' ? textItems : (type === 'emoji' ? emojiItems : (type === 'image' ? imageItems : (type === 'shape' ? shapeItems : lineItems)));
            updateData(widget.id, { [listKey]: list.map(i => i.id === id ? { ...i, scale: newScale } : i) });
          } else if (mode === 'rotate' && type !== 'drawing') {
            const canvasRect = canvasRef.current.getBoundingClientRect();
            const mouseX = me.clientX - canvasRect.left;
            const mouseY = me.clientY - canvasRect.top;
            const angle = Math.atan2(mouseY - item.y, mouseX - item.x) * (180 / Math.PI);
            const listKey = type + 'Items';
            const list = type === 'text' ? textItems : (type === 'emoji' ? emojiItems : (type === 'image' ? imageItems : (type === 'shape' ? shapeItems : lineItems)));
            updateData(widget.id, { [listKey]: list.map(i => i.id === id ? { ...i, rotation: angle + 90 } : i) });
          }
        };

        const onUp = () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
        };

        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      };

      const COLORS = ['#000000', '#ef4444', '#f59e0b', '#22c55e', '#3b82f6', '#8b5cf6', '#ec4899', '#ffffff'];

      useEffect(() => {
        const initialImage = widget.data.initialImage;
        const pastedImage = widget.data.pastedImage;
        const imgToLoad = pastedImage || initialImage;

        if (imgToLoad) {
          const img = new Image();
          img.onload = () => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const scale = Math.min(canvas.width / img.width, canvas.height / img.height) * 0.8;
            const newImg = {
              id: Date.now().toString(),
              src: imgToLoad,
              x: canvas.width / (2 * (window.devicePixelRatio || 1)),
              y: canvas.height / (2 * (window.devicePixelRatio || 1)),
              baseWidth: img.width,
              baseHeight: img.height,
              scale: scale,
              rotation: 0
            };
            updateData(widget.id, {
              imageItems: [...imageItems, newImg],
              initialImage: null,
              pastedImage: null
            });
            setSelectedItem({ type: 'image', id: newImg.id });
          };
          img.src = imgToLoad;
        }
      }, [widget.data.initialImage, widget.data.pastedImage]);

      return (
        <div className="h-full bg-white flex flex-col min-h-0 relative no-drag">
          <div className="bg-gray-50 p-2 border-b flex items-center gap-1 shrink-0 z-20 flex-nowrap overflow-x-auto custom-scrollbar">
            <button onClick={() => setShowBgPicker(!showBgPicker)} className={`p-1.5 rounded-lg transition-all ${bgType !== 'none' ? 'bg-blue-100 text-blue-600' : 'hover:bg-gray-200 text-gray-500'}`} title="Background Template">
              <Layout size={16} />
            </button>
            <div className="w-px h-5 bg-gray-200" />
            <div className="relative">
              <button onClick={() => setShowColorPicker(!showColorPicker)} className="w-7 h-7 rounded-full border-2 border-white shadow-md" style={{ backgroundColor: color }} />
            </div>
            <div className="w-px h-5 bg-gray-200" />
            <button onClick={() => updateData(widget.id, { tool: 'select' })} className={`p-1.5 rounded-lg transition-all ${tool === 'select' ? 'bg-blue-100 text-blue-600' : 'hover:bg-gray-100 text-gray-500'}`} title="Select"><MousePointer2 size={16} /></button>
            <button onClick={() => updateData(widget.id, { tool: 'pen' })} className={`p-1.5 rounded-lg transition-all ${tool === 'pen' ? 'bg-blue-100 text-blue-600' : 'hover:bg-gray-100 text-gray-500'}`} title="Pen"><Pencil size={16} /></button>
            <button onClick={() => updateData(widget.id, { tool: 'eraser' })} className={`p-1.5 rounded-lg transition-all ${tool === 'eraser' ? 'bg-blue-100 text-blue-600' : 'hover:bg-gray-100 text-gray-500'}`} title="Eraser"><Eraser size={16} /></button>
            <button onClick={() => updateData(widget.id, { tool: 'text' })} className={`p-1.5 rounded-lg transition-all ${tool === 'text' ? 'bg-blue-100 text-blue-600' : 'hover:bg-gray-100 text-gray-500'}`} title="Text"><Type size={16} /></button>
            <button onClick={() => setShowEmojiPicker(!showEmojiPicker)} className={`p-1.5 rounded-lg transition-all ${showEmojiPicker ? 'bg-blue-100 text-blue-600' : 'hover:bg-gray-100 text-gray-500'}`} title="Emoji"><Smile size={16} /></button>
            <button onClick={() => setShowShapePicker(!showShapePicker)} className={`p-1.5 rounded-lg transition-all ${showShapePicker ? 'bg-blue-100 text-blue-600' : 'hover:bg-gray-100 text-gray-500'}`} title="Shapes"><Shapes size={16} /></button>
            <button onClick={() => updateData(widget.id, { tool: 'line' })} className={`p-1.5 rounded-lg transition-all ${tool === 'line' ? 'bg-blue-100 text-blue-600' : 'hover:bg-gray-100 text-gray-500'}`} title="Straight Line"><Minus size={16} className="rotate-45" /></button>
            <div className="w-px h-5 bg-gray-200" />

    const dataService = {
      // --- Profiles & Settings ---
      async getProfile(userId) {
        const { data, error } = await supabase
          .from('profiles')
          .select('*')
          .eq('id', userId)
          .maybeSingle();
        if (error && error.code !== 'PGRST116') throw error;
        return data;
      },

      async updateProfile(userId, updates) {
        const { error } = await supabase
          .from('profiles')
          .upsert({ ...updates, id: userId });
        if (error) throw error;
      },

      // --- Slides ---
      async getSlides(userId) {
        const { data, error } = await supabase
          .from('slides')
          .select('*')
          .eq('user_id', userId)
          .order('slide_index', { ascending: true });
        if (error) throw error;
        return data;
      },

      async saveSlide(userId, slideIndex, widgets, lastModified) {
        const payload = {
          user_id: userId,
          slide_index: slideIndex,
          widgets
        };
        if (lastModified) payload.last_modified = lastModified;

        const { error } = await supabase
          .from('slides')
          .upsert(payload, { onConflict: 'user_id,slide_index' });
        if (error) throw error;
      },

      // --- Rosters ---
      async getRosters(userId) {
        const { data, error } = await supabase
          .from('rosters')
          .select('*')
          .eq('user_id', userId);
        if (error) throw error;
        return sanitizeAllRosters(data);
      },

      async deleteRoster(userId, rosterId) {
        if (!rosterId || rosterId === 'default') return;
        const { error } = await supabase
          .from('rosters')
          .delete()
          .eq('user_id', userId)
          .eq('id', rosterId);
        if (error) throw error;
      },

      async saveRoster(userId, rosterData) {
        // Strip 'slides' if present, as it's not in the rosters table schema
        const { slides, ...rosterPayload } = rosterData;

        // UUID Fix: Don't send 'default' as an ID to Supabase as it expects a UUID
        if (rosterPayload.id === 'default') {
          delete rosterPayload.id;
        }

        const { data, error } = await supabase
          .from('rosters')
          .upsert({
            ...rosterPayload,
            user_id: userId,
            last_modified: rosterPayload.last_modified || Date.now()
          })
          .select()
          .single();
        if (error) throw error;

        // Ensure we return sanitized data
        if (data) {
          return {
            ...data,
            name: ensureString(data.name, 'Unnamed Class'),
            roster: sanitizeRoster(data.roster)
          };
        }
        return data;
      }
    };
