    const SlideManager = ({ slides, currentSlideIndex, onSelectSlide, onAddSlide, onReorderSlides, onClose, slideBackgrounds, background, isClosing }) => {
      const [draggedIndex, setDraggedIndex] = useState(null);

      const handleDragStart = (e, index) => {
        setDraggedIndex(index);
        e.dataTransfer.effectAllowed = "move";
      };

      const handleDragOver = (e, index) => {
        e.preventDefault();
        if (draggedIndex === null || draggedIndex === index) return;
        const newSlides = [...slides];
        const draggedSlide = newSlides[draggedIndex];
        newSlides.splice(draggedIndex, 1);
        newSlides.splice(index, 0, draggedSlide);
        onReorderSlides(newSlides);
        setDraggedIndex(index);
      };

      return (
        <div className={`fixed bottom-24 right-8 w-[320px] h-fit max-h-[600px] bg-white/95 backdrop-blur-2xl rounded-[3rem] shadow-[0_20px_60px_rgba(0,0,0,0.35)] border border-white/50 flex flex-col z-[10005] overflow-hidden ${isClosing ? 'animate-slide-manager-close' : 'animate-slide-manager'} origin-bottom-right`}>
          <div className="p-4 border-b border-gray-100 flex items-center justify-between bg-white/50">
            <h3 className="text-lg font-black text-slate-800 flex items-center gap-2">
              <Layout size={18} className="text-indigo-600" />
              Slide Manager
            </h3>
            <button onClick={onClose} className="p-2 hover:bg-red-50 text-slate-400 hover:text-red-500 rounded-full transition-colors">
              <X size={18} />
            </button>
          </div>

          <div className="flex-1 overflow-y-auto p-4 custom-scrollbar bg-slate-50/5">
            <div className="grid grid-cols-3 gap-4">
              {slides.map((slideWidgets, index) => {
                const isActive = index === currentSlideIndex;
                const slideBg = slideBackgrounds[index] || background;
                const isDefaultBg = !slideBg || slideBg.id === 'default' || slideBg.id === 'Original';

                return (
                  <div
                    key={index}
                    draggable
                    onDragStart={(e) => handleDragStart(e, index)}
                    onDragOver={(e) => handleDragOver(e, index)}
                    onDragEnd={() => setDraggedIndex(null)}
                    onClick={() => { onSelectSlide(index); onClose(); }}
                    className={`relative group cursor-pointer transition-all duration-300 ${draggedIndex === index ? 'opacity-0' : 'opacity-100'}`}
                  >
                    <div className={`aspect-video rounded-[2rem] overflow-hidden border-2 transition-all duration-300 shadow-sm group-hover:shadow-lg group-hover:-translate-y-1 ${isActive ? 'border-indigo-600 ring-4 ring-indigo-100' : 'border-white group-hover:border-indigo-200'}`}>
                      <div className="absolute inset-0 pointer-events-none">
                        {isDefaultBg ? <OriginalBackground /> : (
                          <div className="w-full h-full" style={{
                            background: slideBg.type === 'image' ? `url(${slideBg.src}) center/cover` : (slideBg.style?.background || '#dbeafe'),
                            backgroundColor: slideBg.type === 'preset' ? undefined : (slideBg.style?.background || '#dbeafe')
                          }} />
                        )}
                      </div>
                      <SlidePreview widgets={slideWidgets} scale={0.08} textColor={slideBg?.textColor} />
                      <div className="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-colors" />
                    </div>
                    <div className="mt-2 flex items-center justify-center">
                      <span className={`text-[10px] font-black px-2 py-0.5 rounded-full ${isActive ? 'bg-indigo-600 text-white' : 'bg-slate-200 text-slate-500 group-hover:bg-indigo-100 group-hover:text-indigo-600'} transition-colors`}>
                        {index + 1}
                      </span>
                    </div>
                  </div>
                );
              })}
              <button
                onClick={onAddSlide}
                className="aspect-video rounded-[2rem] border-2 border-dashed border-slate-300 flex flex-col items-center justify-center gap-1 hover:border-indigo-400 hover:bg-indigo-50 text-slate-400 hover:text-indigo-600 transition-all group"
              >
                <div className="p-2 rounded-full bg-slate-100 group-hover:bg-indigo-100 transition-colors">
                  <Plus size={16} />
                </div>
                <span className="text-[8px] font-bold uppercase tracking-widest">Add</span>
              </button>
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      const dockClickLockRef = useRef(false);
      const [user, setUser] = useState(null);
      const [isSyncing, setIsSyncing] = useState(false);
      const [lastSyncError, setLastSyncError] = useState(null);
      const [profileLastModified, setProfileLastModified] = useState(null);
      const savingRef = useRef(false);
      const cloudLoaded = useRef(false);
      const lastSyncedRef = useRef({
        profile: null,
        slides: {},
        rosters: {},
        profile_background: null,
        slides_serialized: null,
        rosters_serialized: null,
        schedule_serialized: null
      });

      // Diagnostics State
      const [debugLog, setDebugLog] = useState([]);
      const [channelStatus, setChannelStatus] = useState({
        slides: 'disconnected',
        profile: 'disconnected',
        rosters: 'disconnected'
      });

      const addDebugLog = (msg, type = 'info') => {
        setDebugLog(prev => [{
          id: Date.now().toString(),
          msg,
          time: new Date().toLocaleTimeString(),
          type
        }, ...prev].slice(0, 15));
      };

      const handleHardRefresh = () => {
        if (!window.confirm("This will clear local cache and re-sync from the cloud. Continue?")) return;
        addDebugLog("Starting hard refresh...", 'info');
        localStorage.clear();
        window.location.reload();
      };

      // --- STATE DECLARATIONS ---
      const [allRosters, setAllRosters] = useState(() => {
        try {
          const stored = localStorage.getItem('homeroom_all_rosters');
          if (stored) return sanitizeAllRosters(JSON.parse(stored));
        } catch (e) { }
        const defaultRoster = getRoster();
        const defaultSlides = (() => {
          try {
            let s = JSON.parse(localStorage.getItem(WIDGETS_STORAGE_KEY)) || [[]];
            if (!s[0].some(w => w.type === 'CLOCK')) {
              const clockWidget = {
                id: 'default-clock-' + Date.now(),
                type: 'CLOCK',
                position: { x: 50, y: 40 },
                size: { width: 340, height: 260 },
                zIndex: 100,
                data: { fontSize: 16 },
                isMinimized: false
              };
              s[0].push(clockWidget);
            }
            return s;
          } catch (e) { return [[]]; }
        })();
        return [{ id: 'default', name: 'My Class', roster: defaultRoster, slides: defaultSlides }];
      });

      const [activeRosterId, setActiveRosterId] = useState(() => {
        return localStorage.getItem('homeroom_active_roster_id') || 'default';
      });

      const [roster, setRoster] = useState(() => {
        const active = allRosters.find(r => r.id === (localStorage.getItem('homeroom_active_roster_id') || 'default'));
        return active ? active.roster : allRosters[0].roster;
      });

      const [slides, setSlides] = useState(() => {
        try {
          const globalSlides = JSON.parse(localStorage.getItem('homeroom_slides'));
          if (Array.isArray(globalSlides) && globalSlides.length > 0) return globalSlides;
        } catch (e) { }

        const active = allRosters.find(r => r.id === (localStorage.getItem('homeroom_active_roster_id') || 'default'));
        let initialSlides = active ? (active.slides || [[]]) : [[]];
        if (initialSlides.length === 1 && initialSlides[0].length === 0) {
          const defaultClock = {
            id: 'default-clock',
            type: 'CLOCK',
            position: { x: 0, y: 0 },
            size: { width: 290, height: 100 },
            zIndex: 1,
            data: { fontSize: 20, style: 'standard', isGlassy: 'clear' },
            isMinimized: false
          };
          initialSlides = [[defaultClock]];
        }
        return initialSlides;
      });

      const [currentSlideIndex, setCurrentSlideIndex] = useState(() => {
        try { return parseInt(localStorage.getItem('homeroom_current_slide') || '0'); } catch { return 0; }
      });
      const [targetSlideIndex, setTargetSlideIndex] = useState(null);
      const [selectedId, setSelectedId] = useState(null);
      const [spotlightId, setSpotlightId] = useState(null);
      const [slideTransition, setSlideTransition] = useState(null); // 'forward' or 'backward'
      const [maxZIndex, setMaxZIndex] = useState(10);
      const [currentTime, setCurrentTime] = useState(new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }));
      const [isDockMinimized, setIsDockMinimized] = useState(false);
      const [editingWidgetId, setEditingWidgetId] = useState(null);
      const [clockStyle, setClockStyle] = useState(() => localStorage.getItem('homeroom_clock_style') || 'standard');
      const [showClockDate, setShowClockDate] = useState(() => localStorage.getItem('homeroom_show_clock_date') !== 'false');
      const [isClockGlassy, setIsClockGlassy] = useState(() => localStorage.getItem('homeroom_clock_glassy') || 'clear');
      const [is24Hour, setIs24Hour] = useState(() => localStorage.getItem('homeroom_is_24hour') === 'true');
      const [showSlideManager, setShowSlideManager] = useState(false);

      const handleToggleSlideManager = () => {

          }, 400);
        } else {
          setShowSlideManager(true);
        }
      };

      const [dockOrder, setDockOrder] = useState(() => getDockOrder());

      const [isDockLocked, setIsDockLocked] = useState(true);
      const [showMoreDrawer, setShowMoreDrawer] = useState(false);
      const [isDrawerClosing, setIsDrawerClosing] = useState(false);
      const [drawerKey, setDrawerKey] = useState(0);
      const drawerRef = useRef(null);
      const [history, setHistory] = useState([]);
      const [closingWidgetId, setClosingWidgetId] = useState(null);
      const [redoStack, setRedoStack] = useState([]);
      const [showOnboarding, setShowOnboarding] = useState(false);
      const [showSettingsModal, setShowSettingsModal] = useState(false);
      const [settingsInitialTab, setSettingsInitialTab] = useState('appearance');
      const [showBackupPrompt, setShowBackupPrompt] = useState(true);
      const [selectedDate, setSelectedDate] = useState(new Date());
      const [scheduleTemplate, setScheduleTemplate] = useState(getScheduleTemplate());
      const [scheduleOverrides, setScheduleOverrides] = useState(getScheduleOverrides());
      const [scheduleSettings, setScheduleSettings] = useState(getScheduleSettings());
      const [background, setBackground] = useState(getBackground());
      const [slideBackgrounds, setSlideBackgrounds] = useState(() => { try { return JSON.parse(localStorage.getItem('homeroom_slide_backgrounds')) || {}; } catch { return {}; } });
      const [customBackgrounds, setCustomBackgrounds] = useState(() => { try { return JSON.parse(localStorage.getItem('homeroom_my_backgrounds')) || []; } catch { return []; } });
      const [showBgPicker, setShowBgPicker] = useState(false);
      const [isGridEnabled, setIsGridEnabled] = useState(() => { try { return JSON.parse(localStorage.getItem('homeroom_grid_enabled')) || false; } catch { return false; } });
      const [accentColor, setAccentColor] = useState(() => localStorage.getItem('homeroom_accent_color') || 'indigo');
      const [backupEnabled, setBackupEnabled] = useState(() => { try { return JSON.parse(localStorage.getItem('homeroom_backup_enabled')) ?? true; } catch { return true; } });
      const [backupInterval, setBackupInterval] = useState(() => { try { return parseInt(localStorage.getItem('homeroom_backup_interval')) || 7; } catch { return 7; } });
      const fileInputRef = useRef(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [cloudSyncEnabled, setCloudSyncEnabled] = useState(() => { try { return JSON.parse(localStorage.getItem('homeroom_cloud_sync_enabled')) ?? true; } catch { return true; } });
      const [hasCheckedCloud, setHasCheckedCloud] = useState(false);
      const [hasLocalChanges, setHasLocalChanges] = useState(false);
      const [geminiApiKey, setGeminiApiKey] = useState(() => localStorage.getItem('homeroom_gemini_api_key') || '');
      const [sparkGrade, setSparkGrade] = useState(() => localStorage.getItem('homeroom_spark_grade') || 'Middle School');
      const [studentName, setStudentName] = useState(() => localStorage.getItem('homeroom_student_name') || '');

      const [profilesLastModified, setProfilesLastModified] = useState(() => {
        try { return JSON.parse(localStorage.getItem('homeroom_profiles_last_modified') || '0'); } catch { return 0; }
      });
      const [slidesLastModified, setSlidesLastModified] = useState(() => {
        try { return JSON.parse(localStorage.getItem('homeroom_slides_last_modified') || '0'); } catch { return 0; }
      });
      const [rostersLastModified, setRostersLastModified] = useState(() => {
        try { return JSON.parse(localStorage.getItem('homeroom_rosters_last_modified') || '0'); } catch { return 0; }
      });

      // --- DERIVED STATE ---
      const currentBg = slideBackgrounds[currentSlideIndex] || background;
      const widgets = slides[currentSlideIndex] || [];
      const setWidgets = (newWidgetsOrFn) => {
        setSlides(prev => {
          const next = [...prev];
          const currentWidgets = next[currentSlideIndex] || [];
          const updatedWidgets = typeof newWidgetsOrFn === 'function' ? newWidgetsOrFn(currentWidgets) : newWidgetsOrFn;
          next[currentSlideIndex] = updatedWidgets;
          return next;
        });
      };

      // --- EFFECTS ---

      // Global Redirection Logic (MUST BE AT TOP LEVEL)
      useEffect(() => {
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        if (!user && !authLoading && !isLocal) {
          const timer = setTimeout(() => {
            window.location.href = 'https://ourhomeroom.app';
          }, 2000);
          return () => clearTimeout(timer);
        }
      }, [user, authLoading]);

      // Auth state listener
      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null);
          setAuthLoading(false);
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? null);
          setAuthLoading(false);
          if (!session?.user) {
            setHasCheckedCloud(false);
            setIsSyncing(false);
          }
        });

        return () => subscription.unsubscribe();
      }, []);

      // Realtime Cloud Sync (Cross-browser)
      useEffect(() => {
        if (!user) return;

        const channel = supabase.channel(`realtime:${user.id}`)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'slides', filter: `user_id=eq.${user.id}` }, (payload) => {
            if (isSyncing || hasLocalChanges) return;
            const updatedSlide = payload.new;
            if (updatedSlide && updatedSlide.slide_index !== undefined) {
              // Ignore if this is just an echo of our own change
              const currentSlide = slides[updatedSlide.slide_index];
              if (currentSlide && updatedSlide.last_modified && currentSlide._last_modified === updatedSlide.last_modified) return;

              setSlides(prev => {
                const next = [...prev];
                const widgets = updatedSlide.widgets || [];
                // Attach temporary last_modified to the local state for comparison
                widgets._last_modified = updatedSlide.last_modified;
                next[updatedSlide.slide_index] = widgets;
                return next;
              });
            }
          })
          .on('postgres_changes', { event: '*', schema: 'public', table: 'rosters', filter: `user_id=eq.${user.id}` }, (payload) => {
            if (isSyncing) return;
            const updatedRoster = payload.new;
            if (updatedRoster) {
              lastSyncedRef.current.rosters[updatedRoster.id] = JSON.stringify(updatedRoster);
              setAllRosters(prev => {
                const existingIdx = prev.findIndex(r => r.id === updatedRoster.id || (r.name === updatedRoster.name && !r.id.includes('-')));
                if (existingIdx !== -1) {
                  const existing = prev[existingIdx];
                  if (updatedRoster.last_modified && existing._last_modified === updatedRoster.last_modified) return prev;

                  const next = [...prev];
                  next[existingIdx] = {
                    ...next[existingIdx],
                    name: ensureString(updatedRoster.name, next[existingIdx].name),
                    roster: sanitizeRoster(updatedRoster.roster),
                    id: updatedRoster.id,
                    _last_modified: updatedRoster.last_modified
                  };
                  return next;
                } else {
                  return [...prev, {
                    id: updatedRoster.id,
                    name: ensureString(updatedRoster.name, 'Unnamed Class'),
                    roster: sanitizeRoster(updatedRoster.roster),
                    _last_modified: updatedRoster.last_modified
                  }];
                }
              });
            }
          })
          .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles', filter: `id=eq.${user.id}` }, (payload) => {
            if (isSyncing) return;
            const profile = payload.new;
            if (profile) {
              if (profile.last_modified && profileLastModified === profile.last_modified) return;

              // Construct compare object to avoid ping-pong
              const { last_modified, id: _id, updated_at: _at, ...rest } = profile;
              lastSyncedRef.current.profile = JSON.stringify(rest);

              if (profile.background) setBackground(profile.background);
              if (profile.clock_style) setClockStyle(profile.clock_style);
              if (profile.accent_color) setAccentColor(profile.accent_color);
              if (profile.schedule) setScheduleTemplate(profile.schedule);
              if (profile.dock_order) {
                const order = profile.dock_order;
                if (Array.isArray(order)) {
                  const allDefaults = [...DOCK_MAIN_DEFAULTS, ...DOCK_DRAWER_DEFAULTS];
                  setDockOrder({
                    main: DOCK_MAIN_DEFAULTS.filter(id => order.includes(id)),
                    drawer: [...DOCK_DRAWER_DEFAULTS.filter(id => order.includes(id)), ...order.filter(id => !allDefaults.includes(id)), ...allDefaults.filter(id => !order.includes(id))]
                  });
                } else {
                  setDockOrder(order);
                }
              }
              if (profile.schedule) {
                const { _settings, ...template } = profile.schedule;
                setScheduleTemplate(template);
                if (_settings) setScheduleSettings(_settings);
                else if (profile.schedule_settings) setScheduleSettings(profile.schedule_settings);
              }
              if (profile.schedule_overrides) setScheduleOverrides(profile.schedule_overrides);
              // gemini_api_key is no longer synced to cloud for security — kept in localStorage only
              if (profile.last_modified) setProfileLastModified(profile.last_modified);
            }
          })
          .subscribe();

        return () => { supabase.removeChannel(channel); };
      }, [user, isSyncing, profileLastModified]);

      // --- CLOUD SYNC IMPLEMENTATION ---

      // 1. Fetch from Supabase on Login
      useEffect(() => {
        if (!user) return;

        const loadUserData = async () => {
          setIsSyncing(true);
          try {
            console.log("Fetching cloud data...");
            const profile = await dataService.getProfile(user.id);
            let activeId = profile?.active_roster_id;

            if (profile) {
              const cloudModified = profile.last_modified || 0;
              const localModified = profilesLastModified;

              if (cloudModified >= localModified) {
                console.log("Cloud profile is newer or equal. Updating local state.");
                if (profile.dock_order) {
                  const order = profile.dock_order;
                  if (Array.isArray(order)) {
                    const allDefaults = [...DOCK_MAIN_DEFAULTS, ...DOCK_DRAWER_DEFAULTS];
                    setDockOrder({
                      main: DOCK_MAIN_DEFAULTS.filter(id => order.includes(id)),
                      drawer: [...DOCK_DRAWER_DEFAULTS.filter(id => order.includes(id)), ...order.filter(id => !allDefaults.includes(id)), ...allDefaults.filter(id => !order.includes(id))]
                    });
                  } else {
                    setDockOrder({
                      main: order?.main || [],
                      drawer: order?.drawer || []
                    });
                  }
                }
                if (profile.background) setBackground(profile.background);
                if (profile.slide_backgrounds) setSlideBackgrounds(profile.slide_backgrounds);
                if (profile.my_backgrounds) setCustomBackgrounds(profile.my_backgrounds);

                // Complete Schedule Sync
                if (profile.schedule) {
                  const { _settings, ...template } = profile.schedule;
                  setScheduleTemplate(template);
                  if (_settings) setScheduleSettings(_settings);
                  else if (profile.schedule_settings) setScheduleSettings(profile.schedule_settings);
                }
                if (profile.schedule_overrides) setScheduleOverrides(profile.schedule_overrides);

                if (profile.clock_style) setClockStyle(profile.clock_style);
                if (profile.accent_color) setAccentColor(profile.accent_color);
                if (profile.spark_grade) setSparkGrade(profile.spark_grade);
                if (profile.student_name) setStudentName(profile.student_name);

                setProfilesLastModified(cloudModified);
                if (activeId) setActiveRosterId(activeId);

                // Initialize sync ref with cloud state to prevent immediate sync-back
                const freshProfilePayload = {
                  background: profile.background,
                  slide_backgrounds: profile.slide_backgrounds,
                  my_backgrounds: profile.my_backgrounds,
                  schedule: profile.schedule,
                  schedule_overrides: profile.schedule_overrides,
                  grid_enabled: profile.grid_enabled,
                  clock_style: profile.clock_style,
                  dock_order: profile.dock_order,
                  active_roster_id: profile.active_roster_id,
                  accent_color: profile.accent_color,
                  spark_grade: profile.spark_grade,
                  student_name: profile.student_name
                };
                lastSyncedRef.current.profile = JSON.stringify(freshProfilePayload);
              } else {
                console.log("Local profile is newer. Keeping local version.");
              }
            }

            const [cloudRosters, cloudSlides] = await Promise.all([
              dataService.getRosters(user.id),
              dataService.getSlides(user.id)
            ]);
            let mergedRosters = allRosters;

            if (cloudRosters && Array.isArray(cloudRosters)) {
              const maxCloudModified = Math.max(...cloudRosters.map(r => r.last_modified || 0));

              if (maxCloudModified >= rostersLastModified) {
                console.log("Cloud rosters are newer or equal. Updating local state.");
                const uniqueMap = new Map();
                cloudRosters.forEach(r => uniqueMap.set(r.id, r));

                allRosters.forEach(r => {
                  const alreadyExistsInCloud = cloudRosters.some(cr => cr.id === r.id || cr.name === r.name);
                  if (!alreadyExistsInCloud) {
                    const isUUID = r.id && r.id !== 'default' && /^[0-9a-f]{8}-[0-9a-f]{4}/i.test(String(r.id));
                    const sanitizedRoster = isUUID ? { ...r, id: 'default' } : r;
                    if (!uniqueMap.has(sanitizedRoster.id) || sanitizedRoster.id === 'default') {
                      uniqueMap.set(sanitizedRoster.id === 'default' ? `temp-${Date.now()}-${Math.random()}` : sanitizedRoster.id, sanitizedRoster);
                    }
                  }
                });

                mergedRosters = Array.from(uniqueMap.values()).map(r => {
                  if (typeof r.id === 'string' && r.id.startsWith('temp-')) return { ...r, id: 'default' };
                  return r;
                });
                setAllRosters(mergedRosters);
                setRostersLastModified(maxCloudModified);
                mergedRosters.forEach(r => {
                  lastSyncedRef.current.rosters[r.id] = JSON.stringify(r);
                });
              } else {
                console.log("Local rosters are newer. Keeping local version.");
              }
            }

            // Map cloud slides to the state
            if (cloudSlides && cloudSlides.length > 0) {
              const maxCloudModified = Math.max(...cloudSlides.map(s => s.last_modified || 0));
              if (maxCloudModified >= slidesLastModified) {
                console.log("Cloud slides are newer or equal. Updating local state.");
                const slideArray = [[]];
                cloudSlides.forEach(s => {
                  if (s.slide_index !== undefined) {
                    slideArray[s.slide_index] = s.widgets || [];
                  }
                });
                // Ensure we don't have holes in the array
                for (let i = 0; i < slideArray.length; i++) {
                  if (!slideArray[i]) slideArray[i] = [];
                }
                setSlides(slideArray);
                setSlidesLastModified(maxCloudModified);

                // Initialize sync refs with cloud states
                slideArray.forEach((widgets, i) => {
                  lastSyncedRef.current.slides[i] = JSON.stringify(widgets);
                });
                lastSyncedRef.current.slides_serialized = JSON.stringify(slideArray);
              } else {
                console.log("Local slides are newer. Keeping local version.");
              }
            }

            // Set Active Roster from the Merged Data
            if (activeId) {
              const current = mergedRosters.find(r => r.id === activeId);
              if (current) {
                setActiveRosterId(activeId);
                setRoster(current.roster || []);
              }
            } else if (mergedRosters.length > 0) {
              const first = mergedRosters[0];
              setActiveRosterId(first.id);
              setRoster(first.roster || []);
            }
          } catch (e) {
            console.error('Error loading cloud data:', e);
            setLastSyncError(e.message);
          } finally {
            setIsSyncing(false);
            setHasCheckedCloud(true);
          }
        };

        loadUserData();
      }, [user]);

      // 2. Profile Sync consolidated into main syncToCloud below

      // 2. Sync consolidated into main syncToCloud below

      // --- MANAGEMENT FUNCTIONS ---
      const handleSetActiveRoster = (id) => {
        if (id === activeRosterId) return;
        const next = allRosters.find(r => r.id === id);
        if (next) {
          setRoster(next.roster);
          setActiveRosterId(id);
          localStorage.setItem('homeroom_active_roster_id', id);
        }
      };

      const handleAddRoster = (name, bulkText = '') => {
        const generateUUID = () => {
          if (typeof crypto.randomUUID === 'function') return crypto.randomUUID();
          return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
            var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
          });
        };

        // 1. Parse student names from bulk text
        let initialStudents = [];
        if (bulkText && typeof bulkText === 'string') {
          initialStudents = bulkText.split('\n')
            .map(n => n.trim())
            .filter(n => n)
            .map(name => ({
              id: Math.random().toString(36).substr(2, 9),
              name: name,
              active: true
            }));
        }

        // Clone current slides for the new roster so the layout persists
        let initialSlides = [[]];
        try {
          initialSlides = JSON.parse(JSON.stringify(slides));
        } catch (e) {
          console.error("Failed to clone slides for new roster", e);
        }

        const newId = generateUUID();
        const newRoster = { id: newId, name: name, roster: initialStudents };

        // 2. Update All Rosters
        setAllRosters(prev => [...prev, newRoster]);

        // 3. Switch to New Roster Immediately
        setActiveRosterId(newId);
        setRoster(initialStudents);
        localStorage.setItem('homeroom_active_roster_id', newId);
      };

      const handleDeleteRoster = async (id) => {
        if (allRosters.length <= 1) { alert('You must keep at least one class.'); return; }
        const rosterToDelete = allRosters.find(r => r.id === id);
        if (!window.confirm('Delete class ' + ensureString(rosterToDelete?.name, 'this class') + '? This cannot be undone.')) return;
        const newRosters = allRosters.filter(r => r.id !== id);
        if (activeRosterId === id) {
          const nextRoster = newRosters[0];
          setActiveRosterId(nextRoster.id);
          setRoster(nextRoster.roster || []);
          setSlides(nextRoster.slides || [[]]);
          localStorage.setItem('homeroom_active_roster_id', nextRoster.id);
        }
        setAllRosters(newRosters);
        try { localStorage.setItem('homeroom_all_rosters', JSON.stringify(newRosters)); } catch (err) { console.error(err); }

        // Cloud Sync: Delete from Supabase
        if (user && cloudSyncEnabled) {
          try {
            await dataService.deleteRoster(user.id, id);
          } catch (err) {
            console.error('Failed to delete roster from cloud:', err);
          }
        }

            if (d.scheduleSettings) {
              setScheduleSettings(d.scheduleSettings);
              localStorage.setItem('homeroom_schedule_settings', JSON.stringify(d.scheduleSettings));
            }
            // Restore other settings
            if (d.dock) saveDockOrder(d.dock);
            if (d.background) saveBackground(d.background);
            if (d.widgets) setSlides(d.widgets);
            if (d.dock) setDockOrder(d.dock);
            if (d.background) setBackground(d.background);
            if (d.slideBackgrounds) setSlideBackgrounds(d.slideBackgrounds);
            if (d.customBackgrounds) setCustomBackgrounds(d.customBackgrounds);

            // Restore expanded global settings
            if (d.isClockGlassy !== undefined) { setIsClockGlassy(d.isClockGlassy); localStorage.setItem('homeroom_clock_glassy', d.isClockGlassy); }
            if (d.clockStyle !== undefined) { setClockStyle(d.clockStyle); localStorage.setItem('homeroom_clock_style', d.clockStyle); }
            if (d.showClockDate !== undefined) { setShowClockDate(d.showClockDate); localStorage.setItem('homeroom_clock_show_date', d.showClockDate); }
            if (d.backupEnabled !== undefined) { setBackupEnabled(d.backupEnabled); localStorage.setItem('homeroom_backup_enabled', d.backupEnabled); }
            if (d.backupInterval !== undefined) { setBackupInterval(d.backupInterval); localStorage.setItem('homeroom_backup_interval', d.backupInterval); }
            if (d.isGridEnabled !== undefined) { setIsGridEnabled(d.isGridEnabled); localStorage.setItem('homeroom_grid_enabled', d.isGridEnabled); }
            if (d.currentSlideIndex !== undefined) { setCurrentSlideIndex(d.currentSlideIndex); }
            if (d.geminiApiKey) { setGeminiApiKey(d.geminiApiKey); localStorage.setItem('homeroom_gemini_api_key', d.geminiApiKey); }

            if (d.currentSlideIndex !== undefined) { setCurrentSlideIndex(d.currentSlideIndex); }

            // FORCE REFRESH ROSTER VIEW
            if (d.allRosters && d.activeRosterId) {
              const active = d.allRosters.find(r => r.id === d.activeRosterId);
              if (active) {
                setRoster(active.roster || []);
                // If the export included slides, we've already set them via setSlides above.
                // But in some formats, slides might be inside the roster object.
                if (active.slides) setSlides(active.slides);
              }
            }

            alert("Import successful!");
          } catch (err) { console.error(err); alert("Import failed."); }
        };
        reader.readAsText(file);
      };

      const currentDate = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      useEffect(() => { const timer = setInterval(() => { setCurrentTime(new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })); }, 1000 * 60); return () => clearInterval(timer); }, []);
      // improved onboarding trigger
      useEffect(() => {
        if (authLoading || isSyncing) {
          if (user) setShowOnboarding(false);
          return;
        }
        if (user && !hasCheckedCloud) {
          setShowOnboarding(false);
          return;
        }

        const hasData = allRosters.length > 0 && allRosters.some(r => r.roster && r.roster.length > 0);
        // Only show onboarding if NO data AND NO widgets
        const hasWidgets = slides.some(s => s.length > 0);
        if (!hasData && !hasRoster() && !hasWidgets) {
          setShowOnboarding(true);
        } else {
          setShowOnboarding(false);
        }
      }, [authLoading, isSyncing, hasCheckedCloud, allRosters, user, slides]);

      // --- WIDGET MANAGEMENT ---
      const addWidget = (type, extraData = {}) => {
        addToHistory();
        const id = Date.now().toString() + '-' + Math.random().toString(36).substring(2, 7);
        const size = WIDGET_SIZES[type] || { width: 400, height: 300 };

        const existingCount = (slides[currentSlideIndex] || []).filter(w => w.type === type).length;
        const autoTitle = existingCount > 0 ? `${DOCK_LABELS[type]?.label || type} ${existingCount + 1}` : undefined;

        // Centered position for specific widgets like Randomizer
        let startX, startY;
        if (type === 'RANDOMIZER') {
          startX = Math.round((window.innerWidth - size.width) / 2);
          startY = Math.round((window.innerHeight - size.height) / 2 - 50); // Slightly above middle
        } else {
          startY = (window.innerHeight / 2) - (size.height / 2) + (Math.random() * 40 - 20);
          if (type === 'GROUP_MAKER') startY -= 70;
          if (type === 'SCHEDULE') startY -= 60;
          if (type === 'SEAT_PICKER') startY = 30;
          if (type === 'QR') startY = 20;

          if (type === 'DRAWING') startY -= 80;
          if (type === 'CALCULATOR') startY -= 60;
          if (type === 'COUNTDOWN') startY -= 50;
          if (type === 'SPARK') startY -= 40;
          startX = (window.innerWidth / 2) - (size.width / 2) + (Math.random() * 40 - 20);
          if (type === 'SEAT_PICKER') startX += 60;
          if (type === 'QR') startX = (window.innerWidth / 2) - (size.width / 2);
          if (type === 'WEBCAM') {
            startY = (window.innerHeight / 2) - (size.height / 2) - 100;
            startX = (window.innerWidth / 2) - (size.width / 2);
          }
        }

        const position = { x: startX, y: startY };
        let fontSize = 36;
        if (type === 'RANDOMIZER') fontSize = 20;
        if (type === 'GROUP_MAKER') fontSize = 20;
        if (type === 'SEAT_PICKER') fontSize = 16;
        if (type === 'DICE' || type === 'TRAFFIC') fontSize = 16;
        if (type === 'TIMER') fontSize = 14;
        if (type === 'SCHEDULE') fontSize = 24;
        if (type === 'TEXT') fontSize = 12;

        let data = { fontSize };
        if (autoTitle) data.title = autoTitle;

        if (type === 'TIMER') data = { ...data, timeLeft: 120, isRunning: false, mode: 'visual' };
        if (type === 'RANDOMIZER') data = { ...data, students: getInitialStudents(), currentName: null, isAnimating: false, pickedStudents: [] };
        if (type === 'GROUP_MAKER') data = { ...data, students: getInitialStudents(), groupCount: 4, groups: [] };
        if (type === 'SEAT_PICKER') {
          const existing = (slides[currentSlideIndex] || []).find(w => w.type === 'SEAT_PICKER');
          if (existing) {
            data = { ...existing.data, isEditing: false };
          } else {
            const savedDesks = getSeatLayout();
            if (savedDesks && savedDesks.length > 0) {
              data = { ...data, desks: savedDesks, isEditing: false };
            } else {
              const initialStudents = getInitialStudents();
              const initialDesks = initialStudents.slice(0, 8).map((s, i) => ({ id: `desk-${i}`, x: 50 + (i % 4) * 150, y: 50 + Math.floor(i / 4) * 120, student: s.name, color: 'blue', type: 'student', rotation: 0 }));
              data = { ...data, desks: initialDesks, isEditing: false };
            }
          }
        }
        if (type === 'TEXT') data = { ...data, mode: 'text', content: '', items: [] };
        if (type === 'OVERLAY_TEXT') data = { ...data, content: '', isGlassy: false };
        if (type === 'WEBCAM') data = { ...data, isMirrored: false, isActive: true };
        if (type === 'DICE') data = { ...data, sides: 6, diceCount: 1, results: [1], isRolling: false };
        if (type === 'TRAFFIC') data = { ...data, activeLight: null };
        if (type === 'QR') data = { ...data, url: '' };
        if (type === 'VOTE') data = { ...data, question: 'Class Poll', options: [{ id: 1, text: 'Yes', count: 0 }, { id: 2, text: 'No', count: 0 }] };
        if (type === 'DRAWING') {
          startY += 80;
          position.y = startY;
          data = { ...data, canvasData: null, color: '#000000', brushSize: 5, tool: 'pen', initialImage: null, pastedImage: null };
        }
        if (type === 'SCHEDULE') {
          const template = getScheduleTemplate();
          const today = DAYS_OF_WEEK[new Date().getDay()];
          data = { ...data, items: template[today] || [] };
        }
        if (type === 'YOUTUBE') data = { ...data, youtubeUrl: '' };
        if (type === 'CLOCK') data = { ...data, style: 'standard', isGlassy: 'clear', is24Hour: false, fontSize: 20 };
        if (type === 'CALENDAR') data = { ...data, isGlassy: true };
        if (type === 'MARBLE_JAR') data = { ...data, title: 'Classroom Goal', marbles: 0, goalCount: 50, theme: 'classic', sound: 'clink', jarColor: 'standard' };
        if (type === 'SOUNDBOARD') data = { ...data };
        if (type === 'CALCULATOR') data = { ...data, display: '0', prevValue: null, operator: null, expression: '' };
        if (type === 'COUNTDOWN') data = { ...data, eventName: '', targetDate: '', isRunning: false };
        if (type === 'GAMES') data = { ...data, activeGame: 'wordle' };
        if (type === 'SORT') data = { ...data, mode: 'setup', categoryCount: 2, bulkText: '', categories: [], unsorted: [] };

        data = { ...data, ...extraData };
        const newWidget = { id, type, position, size, zIndex: maxZIndex + 1, data, isMinimized: false };
        setWidgets(prev => [...prev, newWidget]);
        setMaxZIndex(prev => prev + 1);
        setSelectedId(id);
      };
      // Paste Listener
      useEffect(() => {
        const handlePaste = (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) {
            return;
          }
          const items = e.clipboardData.items;
          if (!items) return;
          for (let i = 0; i < items.length; i++) {
            const item = items[i];
            if (item.type.indexOf('image') !== -1) {
              const blob = item.getAsFile();
              const reader = new FileReader();
              reader.onload = (event) => {
                const src = event.target.result;

                addWidget('DRAWING', { initialImage: src });
              };
              reader.readAsDataURL(blob);
              e.preventDefault();
              return;
            }
            if (item.type.indexOf('text/plain') !== -1 && item.kind === 'string') {
              item.getAsString((text) => {
                if (text && text.trim()) {
                  addWidget('TEXT', { content: text });
                }
              });
              e.preventDefault();
              return;
            }
          }
        };
        window.addEventListener('paste', handlePaste);
        return () => window.removeEventListener('paste', handlePaste);
      }, [addWidget, updateWidgetData, selectedId, slides, currentSlideIndex]);

      const removeWidget = (id) => {
        setClosingWidgetId(id);
        setTimeout(() => {
          addToHistory();
          const widget = (slides[currentSlideIndex] || []).find(w => w.id === id);
          if (widget && widget.type === 'SEAT_PICKER' && widget.data.desks) {
            saveSeatLayout(widget.data.desks);
          }
          setWidgets(prev => prev.filter(w => w.id !== id));
          if (selectedId === id) setSelectedId(null);
          setClosingWidgetId(null);
        }, 300);
      };

      const bringToFront = (id) => {
        setSelectedId(id);
        const widget = widgets.find(w => w.id === id);
        if (!widget || widget.zIndex === maxZIndex) return;
        setMaxZIndex(prev => {
          const nextZ = prev + 1;
          setWidgets(current => current.map(w => w.id === id ? { ...w, zIndex: nextZ } : w));
          return nextZ;
        });
      };
      const toggleMinimize = useCallback((id, e = null) => {
        const widget = widgets.find(w => w.id === id);
        if (!widget) return;

        let targetRect = null;
        // ALWAYS try to find the dock icon for this type first
        const dockIcon = document.querySelector(`[data-dock-type="${widget.type}"]`);

        if (dockIcon) {
          targetRect = dockIcon.getBoundingClientRect();
        } else {
          // Fallback to "More" button if icon is in closed drawer
          const moreButton = document.querySelector('[data-dock-more="true"]');
          if (moreButton) {
            targetRect = moreButton.getBoundingClientRect();
          } else if (e) {
            targetRect = e.currentTarget.getBoundingClientRect();
          }
        }

        if (targetRect) {
          const centerX = targetRect.left + targetRect.width / 2;
          const centerY = targetRect.top + targetRect.height / 2;
          const el = document.querySelector(`[data-widget-id="${id}"]`);
          if (el) {
            el.style.setProperty('--dock-x', `${centerX}px`);
            el.style.setProperty('--dock-y', `${centerY}px`);
          }
        }
        setWidgets(prev => prev.map(w => w.id === id ? { ...w, isMinimized: !w.isMinimized } : w));
      }, [setWidgets, widgets]);
      const toggleSpotlight = useCallback((id) => { setSpotlightId(prev => prev === id ? null : id); }, []);
      const nextSlide = () => {
        if (slideTransition) return;
        const nextIdx = currentSlideIndex + 1;
        const isNewSlide = currentSlideIndex === slides.length - 1;
        if (isNewSlide) {
          const clockSize = WIDGET_SIZES['CLOCK'];
          const defaultClock = {
            id: 'clock-' + Date.now(), type: 'CLOCK', position: { x: 20, y: 20 }, size: clockSize, zIndex: 1, data: { style: 'standard', isGlassy: 'clear' }, isMinimized: false
          };
          setSlides(prev => [...prev, [defaultClock]]);
          setSlideBackgrounds(prev => ({ ...prev, [nextIdx]: BACKGROUNDS[0] }));
        }
        setTargetSlideIndex(nextIdx);
        setSlideTransition('forward');
        setTimeout(() => {
          setCurrentSlideIndex(nextIdx);
          setTargetSlideIndex(null);
          setSlideTransition(null);
          setSelectedId(null);
        }, 400);
      };

      const prevSlide = () => {
        if (currentSlideIndex > 0 && !slideTransition) {
          const nextIdx = currentSlideIndex - 1;
          setTargetSlideIndex(nextIdx);
          setSlideTransition('backward');
          setTimeout(() => {
            setCurrentSlideIndex(nextIdx);
            setTargetSlideIndex(null);
            setSlideTransition(null);
            setSelectedId(null);
          }, 400);
        }
      };
      const deleteCurrentSlide = () => {
        if (slides.length <= 1) return;
        if (!window.confirm("Delete this page? This cannot be undone.")) return;

        const idxToDelete = currentSlideIndex;

        // 1. Update Slides Array
        let updatedSlides = [];
        setSlides(prev => {
          const newSlides = prev.filter((_, i) => i !== idxToDelete);
          updatedSlides = newSlides.length > 0 ? newSlides : [[]];
          return updatedSlides;
        });

        // 2. Update Slide Backgrounds (Shift remaining keys down)
        setSlideBackgrounds(prev => {
          const next = { ...prev };
          delete next[idxToDelete];
          Object.keys(next).map(Number).sort((a, b) => a - b).forEach(k => {
            if (k > idxToDelete) {
              next[k - 1] = next[k];
              delete next[k];
            }
          });
          return next;
        });

        // 3. Update Index (Safely)
        setCurrentSlideIndex(prev => {
          const newLen = slides.length - 1;
          if (prev >= newLen) return Math.max(0, newLen - 1);
          return prev;
        });

        // 4. Persistence handled by useEffect
      };

      const duplicateCurrentSlide = () => {
        addToHistory();
        const newSlide = JSON.parse(JSON.stringify(slides[currentSlideIndex])).map(w => ({ ...w, id: Date.now().toString() + Math.random().toString(36).substr(2, 5) }));

        const newSlides = [...slides];
        const newIndex = currentSlideIndex + 1;
        newSlides.splice(newIndex, 0, newSlide);

        setSlides(newSlides);

        // Correct Background Shifting for Duplication
        setSlideBackgrounds(prev => {
          const next = { ...prev };
          // All backgrounds after currentIndex must shift up
          Object.keys(next).map(Number).sort((a, b) => b - a).forEach(k => {
            if (k > currentSlideIndex) {
              next[k + 1] = next[k];
              delete next[k];
            }
          });
          // Copy current background to new slide if it exists
          if (prev[currentSlideIndex]) {
            next[newIndex] = prev[currentSlideIndex];
          }
          return next;
        });

        setCurrentSlideIndex(newIndex);

        // Persistent Save handled by useEffect
      };

      const handleAddSlide = () => {
        addToHistory();
        const newSlide = [];
        const newSlides = [...slides, newSlide];
        setSlides(newSlides);
        setCurrentSlideIndex(newSlides.length - 1);
        setShowSlideManager(false);
      };

      const handleReorderSlides = (newSlides) => {
        // Reorder backgrounds
        const newBgMap = {};
        newSlides.forEach((s, i) => {
          const oldIndex = slides.indexOf(s);
          if (oldIndex !== -1 && slideBackgrounds[oldIndex]) {
            newBgMap[i] = slideBackgrounds[oldIndex];
          }
        });

        // Find new current index
        const currentSlide = slides[currentSlideIndex];
        const newCurrentIndex = newSlides.indexOf(currentSlide);

        setSlides(newSlides);
        setSlideBackgrounds(newBgMap);
        if (newCurrentIndex !== -1) setCurrentSlideIndex(newCurrentIndex);
      };

      // Removed legacy saveDock/handleDockDrop
      const renderDockItem = (id, location = 'main') => {
        const info = DOCK_LABELS[id];
        if (!info) return null;

        const isMain = location === 'main';
        const containerClasses = isMain
          ? `flex flex-col items-center gap-0.5 py-1 px-2 rounded-xl transition-all cursor-pointer group relative dock-item-premium
              ${!isDockLocked ? 'hover:bg-blue-50 border-2 border-dashed border-blue-300' : 'hover:bg-white/50 border-2 border-transparent'}`
          : `flex flex-col items-center gap-0 px-1 py-1 rounded-lg transition-all cursor-pointer group hover:bg-black/5`;

        const activeInstances = widgets.filter(w => w.type === id);
        const isActive = activeInstances.length > 0;
        const isMinimizedStatus = activeInstances.some(w => w.isMinimized);

        const iconClasses = `flex flex-col items-center justify-center rounded-xl transition-all dock-icon-wrapper dock-animate-hover relative ${!isDockLocked
          ? 'bg-blue-100 text-slate-600'
          : isMinimizedStatus
            ? 'bg-indigo-100 border border-indigo-200 text-indigo-600 shadow-inner'
            : (isMain
              ? (currentBg?.textColor === 'text-white' ? 'bg-black/20 backdrop-blur-sm text-white shadow-sm' : 'bg-white/80 text-slate-700 shadow-sm')
              : 'bg-white/80 text-slate-600 shadow-sm shadow-black/5')
          } ${isMain ? 'w-12 h-12' : 'w-10 h-10'}`;

        return (
          <div
            key={id}
            data-dock-type={id}
            draggable={!isDockLocked}
            onDragStart={(e) => {
              e.dataTransfer.setData('widgetType', id);
              e.currentTarget.style.transform = "rotate(5deg) scale(1.1)";
              requestAnimationFrame(() => e.target.classList.add('opacity-0'));
            }}
            onDragEnd={(e) => {
              e.currentTarget.style.transform = "";
              e.target.classList.remove('opacity-0');
            }}
            onDragOver={(e) => {
              if (!isDockLocked) { e.preventDefault(); e.stopPropagation(); }
            }}
            onDrop={(e) => {
              if (!isDockLocked) { e.preventDefault(); e.stopPropagation(); handleDockDrop(e, location, id); }
            }}
            onClick={(e) => {
              if (!isDockLocked) return;
              if (isDockMinimized) return;

              if (dockClickLockRef.current) return;
              dockClickLockRef.current = true;
              setTimeout(() => { dockClickLockRef.current = false; }, 300);

              // Shift click always adds a new instance
              if (e.shiftKey) {
                if (e.preventDefault) e.preventDefault();
                if (e.stopPropagation) e.stopPropagation();
                addWidget(id);
                if (location === 'drawer') setShowMoreDrawer(false);
                return;
              }

              const activeWidgets = (slides[currentSlideIndex] || []).filter(w => w.type === id);

              if (activeWidgets.length > 0) {
                // Find the most recently used (highest Z)
                const sorted = [...activeWidgets].sort((a, b) => (b.zIndex || 0) - (a.zIndex || 0));
                const topMost = sorted[0];

                if (topMost.isMinimized) {
                  toggleMinimize(topMost.id, e);
                  bringToFront(topMost.id);
                } else {
                  // If it's already focused (maxZ), minimize it. Otherwise bring to front.
                  if (topMost.zIndex === maxZIndex) {
                    toggleMinimize(topMost.id, e);
                  } else {
                    bringToFront(topMost.id);
                  }
                }
              } else {
                addWidget(id);
              }

              if (location === 'drawer') setShowMoreDrawer(false);
            }}
            className={containerClasses}
            title={!isDockLocked ? "Drag to reorder" : info.label}
          >
            {isMain && !isDockLocked && <div className="absolute -top-1 -right-1 bg-blue-500 text-white rounded-full p-0.5 shadow-sm z-10"><GripVertical size={10} /></div>}

            {/* Main Icon */}
            <div className={iconClasses}>
              {info.icon}
              {activeInstances.length > 1 && (
                <div className="absolute top-1 right-1 bg-indigo-600 text-white text-[9px] font-black w-4 h-4 flex items-center justify-center rounded-full shadow-lg border border-white/20 animate-in zoom-in duration-300">
                  {activeInstances.length}
                </div>
              )}
            </div>

            {/* Reflection (Overly Premium) */}
            {isMain && (
              <div className="absolute top-full left-0 right-0 flex flex-col items-center pointer-events-none -mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                <div className={`${iconClasses} dock-reflection`}>
                  {info.icon}
                </div>
              </div>
            )}

            <span className={`transition-all duration-200 group-hover:scale-105 group-hover:-translate-y-0.5 ${isMain ? 'text-[10px] font-bold' : 'text-[9px] font-extrabold'} ${isMain ? (currentBg?.textColor || 'text-slate-700') : 'text-slate-700'}`}>
              {info.label}
            </span>
            {isActive && (
              <div className={`mt-0.5 w-[4px] h-[4px] rounded-full ${isMinimizedStatus ? 'bg-indigo-500' : (currentBg?.textColor === 'text-white' ? 'bg-white/80' : 'bg-slate-600')} transition-all`} />
            )}
          </div>
        );
      };

      const renderWidgetContent = (widget) => {
        const isSelected = selectedId === widget.id;
        const props = {
          widget: { ...widget, updateLayout: updateWidgetLayout },
          updateData: updateWidgetData,
          updateLayout: updateWidgetLayout,
          isSelected,
          roster,
          allRosters,
          activeRosterId,
          onUpdateRoster: (newRoster, rosterId) => {
            const targetId = rosterId || activeRosterId;
            const updatedAll = allRosters.map(r => r.id === targetId ? { ...r, roster: newRoster } : r);
            localStorage.setItem('homeroom_all_rosters', JSON.stringify(updatedAll));
            setAllRosters(updatedAll);
            if (targetId === activeRosterId) {
              setRoster(newRoster);
            }
          },
          extraProps: {
            clockStyle: widget.data?.style || clockStyle,
            setClockStyle: setClockStyle,
            onOpenSettings: () => { setSettingsInitialTab('appearance'); setShowSettingsModal(true); },
            isGlassy: widget.data?.isGlassy || isClockGlassy,
            showDate: widget.data?.showDate !== undefined ? widget.data.showDate : showClockDate,
            textColor: currentBg?.textColor || 'text-slate-800',
            accent_color: accentColor,
            theme: THEME_COLORS[accentColor] || THEME_COLORS.indigo,
            geminiApiKey: geminiApiKey,
            setGeminiApiKey: (key) => {
              setGeminiApiKey(key);
              localStorage.setItem('homeroom_gemini_api_key', key);
            },
            sparkGrade,
            setSparkGrade,
            studentName,
            setStudentName
          },
          user: user // Pass user to widgets
        };

        switch (widget.type) {
          case 'TIMER': return <TimerWidget {...props} />;
          case 'RANDOMIZER': return <RandomizerWidget {...props} />;
          case 'GROUP_MAKER': return <GroupMakerWidget {...props} />;
          case 'SEAT_PICKER': return <SeatPickerWidget {...props} />;
          case 'TEXT': return <TextWidget {...props} />;
          case 'OVERLAY_TEXT': return <SimpleTextWidget {...props} />;
          case 'WEBCAM': return <WebcamWidget {...props} />;
          case 'DICE': return <DiceWidget {...props} />;
          case 'TRAFFIC': return <TrafficLightWidget {...props} />;
          case 'QR': return <ExitTicketWidget {...props} />;
          case 'SPARK': return <SparkWidget {...props} />;
          case 'VOTE': return <VoteWidget {...props} />;
          case 'DRAWING': return <DrawingWidget {...props} />;
          case 'SCHEDULE': return <ScheduleWidget {...props} selectedDate={selectedDate} setSelectedDate={setSelectedDate} scheduleTemplate={scheduleTemplate} setScheduleTemplate={setScheduleTemplate} scheduleOverrides={scheduleOverrides} setScheduleOverrides={setScheduleOverrides} scheduleSettings={scheduleSettings} setScheduleSettings={setScheduleSettings} onOpenSettings={() => { setSettingsInitialTab('schedule'); setShowSettingsModal(true); }} />;
          case 'YOUTUBE': // Legacy support

                  <div className="relative w-12 h-12">
                    <div className="absolute inset-0 border-4 border-white/5 rounded-full"></div>

                    <div className="absolute inset-2 border-2 border-white/5 rounded-full"></div>

                    >
                      <div className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-4 border-b border-slate-100 pb-2 flex items-center gap-2">
                        <Layout size={12} className="text-indigo-500" />
                        <span>Additional Tools</span>
                      </div>
                      <div className="grid grid-cols-4 gap-4">
                        {dockOrder?.drawer?.length > 0 ? (
                          dockOrder.drawer.map((id) => renderDockItem(id, 'drawer'))
                        ) : (
                          <div className="col-span-4 text-center py-8 text-sm text-slate-400 font-medium">
                            <p>No tools here.</p>
                            <p className="text-[10px] opacity-60">Drag tools here to hide them.</p>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>

                <div className="w-px h-8 bg-slate-300 mx-2" />

                <button
                  onClick={() => setIsDockLocked(!isDockLocked)}
                  className={`p-1.5 rounded-full transition-all group ${!isDockLocked ? 'bg-blue-100 text-blue-600 shadow-inner' : 'hover:bg-slate-100 text-slate-500 hover:text-slate-700'}`}
                  title={isDockLocked ? "Unlock Dock to Rearrange" : "Lock Dock"}
                >
                  {isDockLocked ? <Lock size={16} className="group-hover:animate-wiggle" /> : <Unlock size={16} className="group-hover:animate-wiggle" />}
                </button>
              </div>
            </div>
            <div className="pointer-events-auto transition-all duration-300 z-50 mt-1">
              <button onClick={() => setIsDockMinimized(!isDockMinimized)} className="bg-white/90 backdrop-blur-md hover:bg-white text-slate-500 hover:text-blue-600 p-1.5 rounded-full shadow-lg border border-white/50 transition-all active:scale-95">
                {isDockMinimized ? <ChevronUp size={22} /> : <ChevronDown size={22} />}
              </button>
            </div>
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    const params = new URLSearchParams(window.location.search);
    if (params.get('mode') === 'student') {
      root.render(<StudentDashboard />);
    } else {
      root.render(<App />);
    }
  </script>
</body>

</html>
